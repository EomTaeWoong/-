function normalizePlanKey(name) {
  let n = (name || '').replace(/\(.*?\)/g, '').trim();
  if (n === '스페셜 A') n = '데이터 스페셜 A';
  if (n === '스페셜 B') n = '데이터 스페셜 B';
  return n;
}

function formatPlanName(name) {
  if (!name) return '';
  if (name.includes('(가입 중단)')) {
    const parts = name.split('(가입 중단)');
    return <>{parts[0]}<span className="text-red-500 font-bold">(가입 중단)</span>{parts[1]}</>;
  }
  return name;
}

// =====================================================================
// 🛠️ [리팩토링] 공통 요금 정산 바인딩 함수 (지원금 추출 자동 매핑 로직)
// =====================================================================
function getSupportAmounts({ selectedDevice, selectedPlanPrice, operator, joinType, isGalcams, policyData }) {
  const devicePolicy = policyData.DEVICES[selectedDevice];
  if (!devicePolicy) {
    return { commonSupport: 0, additionalSupport: 0, selectiveAdditionalSupport: 0 };
  }

  let commonSupport = 0;
  if (operator === 'U' && devicePolicy.U_COMMON && devicePolicy.U_COMMON[selectedPlanPrice] !== undefined) {
    commonSupport = devicePolicy.U_COMMON[selectedPlanPrice];
  } else if (operator === 'KT' && devicePolicy.KT_COMMON && devicePolicy.KT_COMMON[selectedPlanPrice] !== undefined) {
    commonSupport = devicePolicy.KT_COMMON[selectedPlanPrice];
  }

  let additionalSupport = 0;
  let selectiveAdditionalSupport = 0;
  const extraConfig = devicePolicy.EXTRA || {};

  if (operator === 'U') {
    let policyBlock = null;
    if (joinType === '기기변경') {
      policyBlock = isGalcams ? extraConfig.U_CHANGE_GALCAMS : extraConfig.U_CHANGE_DOTCOM;
    } else if (joinType === '번호이동') {
      policyBlock = isGalcams ? extraConfig.U_MNP_GALCAMS : extraConfig.U_MNP_DOTCOM;
    }

    if (policyBlock) {
      if (policyBlock.OVER_95K !== undefined && selectedPlanPrice >= 95000) {
        additionalSupport = policyBlock.OVER_95K.common;
        selectiveAdditionalSupport = policyBlock.OVER_95K.selective;
      } else if (policyBlock.OVER_61K !== undefined && selectedPlanPrice >= 61000) {
        additionalSupport = policyBlock.OVER_61K.common;
        selectiveAdditionalSupport = policyBlock.OVER_61K.selective;
      } else if (policyBlock.OVER_33K !== undefined && selectedPlanPrice >= 33000) {
        additionalSupport = policyBlock.OVER_33K.common;
        selectiveAdditionalSupport = policyBlock.OVER_33K.selective;
      }
    } else {
      let baseAdd = 0;
      if (extraConfig.U_TIER_A_DOTCOM !== undefined) {
        if (selectedPlanPrice >= policyData.TIERS.U_TIER_A_MIN) baseAdd = isGalcams ? (extraConfig.U_TIER_A_GALCAMS || 0) : (extraConfig.U_TIER_A_DOTCOM || 0);
      } else if (selectedPlanPrice >= policyData.TIERS.U_TIER_1_MIN && selectedPlanPrice < policyData.TIERS.U_TIER_1_MAX) {
        baseAdd = isGalcams ? (extraConfig.U_TIER_1_GALCAMS || 0) : (extraConfig.U_TIER_1_DOTCOM || 0);
      } else if (selectedPlanPrice >= policyData.TIERS.U_TIER_2_MIN) {
        baseAdd = isGalcams ? (extraConfig.U_TIER_2_GALCAMS || 0) : (extraConfig.U_TIER_2_DOTCOM || 0);
      }
      additionalSupport = baseAdd;
      selectiveAdditionalSupport = baseAdd;
    }
  } else if (operator === 'KT') {
    let policyBlock = null;
    if (joinType === '기기변경') {
      policyBlock = isGalcams ? extraConfig.KT_CHANGE_GALCAMS : extraConfig.KT_CHANGE_DOTCOM;
    } else if (joinType === '번호이동') {
      policyBlock = isGalcams ? extraConfig.KT_MNP_GALCAMS : extraConfig.KT_MNP_DOTCOM;
    }

    if (policyBlock) {
      if (policyBlock.OVER_90K !== undefined && selectedPlanPrice >= 90000) {
        additionalSupport = policyBlock.OVER_90K.common;
        selectiveAdditionalSupport = policyBlock.OVER_90K.selective;
      } else if (policyBlock.OVER_61K !== undefined && selectedPlanPrice >= 61000) {
        additionalSupport = policyBlock.OVER_61K.common;
        selectiveAdditionalSupport = policyBlock.OVER_61K.selective;
      } else if (policyBlock.OVER_33K !== undefined && selectedPlanPrice >= 33000) {
        additionalSupport = policyBlock.OVER_33K.common;
        selectiveAdditionalSupport = policyBlock.OVER_33K.selective;
      }
    } else {
      if (selectedPlanPrice >= policyData.TIERS.KT_TIER_1_MIN) {
        let baseAdd = isGalcams ? (extraConfig.KT_TIER_1_GALCAMS || 0) : (extraConfig.KT_TIER_1_DOTCOM || 0);
        additionalSupport = baseAdd;
        selectiveAdditionalSupport = baseAdd;
      }
    }
  }

  return { commonSupport, additionalSupport, selectiveAdditionalSupport };
}

// ------------------ 독립형 유지 비용 팝업 컴포넌트 ------------------
function MaintenanceCostPopup({ onClose, operator, plans, features, initialData, policyData }) {
  const [selectedDevice, setSelectedDevice] = useState(initialData?.selectedDevice || CATEGORIZED_DEVICE_LIST[0].devices[0].name);
  const [selectedPlan, setSelectedPlan] = useState(initialData?.selectedPlan || plans[0]?.name || '');
  const [installMonths, setInstallMonths] = useState(initialData?.installMonths ?? 24);
  const [interestRate] = useState(0.059);
  
  const [commonSupport, setCommonSupport] = useState(initialData?.commonSupport || 0);
  const [additionalSupport, setAdditionalSupport] = useState(initialData?.additionalSupport || 0);
  const [selectiveAdditionalSupport, setSelectiveAdditionalSupport] = useState(initialData?.selectiveAdditionalSupport || 0); 
  const [, setAdditionalEdited] = useState(initialData?.additionalEdited || false);
  const [contractType, setContractType] = useState(initialData?.contractType || '공통지원');
  
  const [joinType, setJoinType] = useState(initialData?.joinType || '기기변경');
  const [isGalcams, setIsGalcams] = useState(initialData?.isGalcams || false);

  const [planSearchTerm, setPlanSearchTerm] = useState('');
  const [isPlanDropdownOpen, setIsPlanDropdownOpen] = useState(false);
  const planDropdownRef = useRef(null);

  const [selectedPlan2, setSelectedPlan2] = useState(initialData?.selectedPlan || plans[0]?.name || '');
  const [planSearchTerm2, setPlanSearchTerm2] = useState('');
  const [isPlanDropdownOpen2, setIsPlanDropdownOpen2] = useState(false);
  const planDropdownRef2 = useRef(null);
  
  const isFirstRender = useRef(true);

  const isPreorderDevice = useMemo(() => {
    const preorderCategory = CATEGORIZED_DEVICE_LIST.find(c => c.category === '사전예약');
    return preorderCategory ? preorderCategory.devices.some(d => d.name === selectedDevice) : false;
  }, [selectedDevice]);

  const doubleStorageDiscount = isPreorderDevice ? PREORDER_DOUBLE_STORAGE_DISCOUNT : 0;

  useEffect(() => { 
    if (!plans.some(p => p.name === selectedPlan)) setSelectedPlan(plans[0]?.name || ''); 
    if (!plans.some(p => p.name === selectedPlan2)) setSelectedPlan2(plans[0]?.name || ''); 
  }, [plans]);

  useEffect(() => {
    const plan = plans.find(p => p.name === selectedPlan);
    setPlanSearchTerm(plan ? `${plan.name} (${plan.price.toLocaleString()}원)` : selectedPlan);
  }, [selectedPlan, plans]);

  useEffect(() => {
    const handleClickOutside = (event) => {
      if (planDropdownRef.current && !planDropdownRef.current.contains(event.target)) {
        setIsPlanDropdownOpen(false);
        const plan = plans.find(p => p.name === selectedPlan);
        setPlanSearchTerm(plan ? `${plan.name} (${plan.price.toLocaleString()}원)` : selectedPlan);
      }
    };
    document.addEventListener("mousedown", handleClickOutside);
    return () => document.removeEventListener("mousedown", handleClickOutside);
  }, [selectedPlan, plans]);

  const filteredPlans = useMemo(() => {
    const term = planSearchTerm.trim().toLowerCase();
    const plan = plans.find(p => p.name === selectedPlan);
    const formattedSelected = plan ? `${plan.name} (${plan.price.toLocaleString()}원)`.toLowerCase() : selectedPlan.toLowerCase();
    
    if (!term || term === formattedSelected) return plans;
    return plans.filter(p => 
      (p.name || '').toLowerCase().includes(term) || 
      p.price.toString().includes(term.replace(/,/g, '')) ||
      (p.category || '').toLowerCase().includes(term)
    );
  }, [plans, planSearchTerm, selectedPlan]);

  useEffect(() => {
    const plan = plans.find(p => p.name === selectedPlan2);
    setPlanSearchTerm2(plan ? `${plan.name} (${plan.price.toLocaleString()}원)` : selectedPlan2);
  }, [selectedPlan2, plans]);

  useEffect(() => {
    const handleClickOutside = (event) => {
      if (planDropdownRef2.current && !planDropdownRef2.current.contains(event.target)) {
        setIsPlanDropdownOpen2(false);
        const plan = plans.find(p => p.name === selectedPlan2);
        setPlanSearchTerm2(plan ? `${plan.name} (${plan.price.toLocaleString()}원)` : selectedPlan2);
      }
    };
    document.addEventListener("mousedown", handleClickOutside);
    return () => document.removeEventListener("mousedown", handleClickOutside);
  }, [selectedPlan2, plans]);

  const filteredPlans2 = useMemo(() => {
    const term = planSearchTerm2.trim().toLowerCase();
    const plan = plans.find(p => p.name === selectedPlan2);
    const formattedSelected = plan ? `${plan.name} (${plan.price.toLocaleString()}원)`.toLowerCase() : selectedPlan2.toLowerCase();
    
    if (!term || term === formattedSelected) return plans;
    return plans.filter(p => 
      (p.name || '').toLowerCase().includes(term) || 
      p.price.toString().includes(term.replace(/,/g, '')) ||
      (p.category || '').toLowerCase().includes(term)
    );
  }, [plans, planSearchTerm2, selectedPlan2]);

  const isFirstRenderGalcams = useRef(true);
  useEffect(() => {
    if (isFirstRenderGalcams.current) {
      isFirstRenderGalcams.current = false;
      return;
    }
    setIsGalcams(false);
  }, [operator, selectedDevice]);

  useEffect(() => {
    if (isFirstRender.current) {
      isFirstRender.current = false;
      return;
    }
    const planInfo = plans.find(p => p.name === selectedPlan);
    const planPrice = planInfo ? planInfo.price : 0;

    const { commonSupport: comm, additionalSupport: addComm, selectiveAdditionalSupport: addSel } = getSupportAmounts({
      selectedDevice,
      selectedPlanPrice: planPrice,
      operator,
      joinType,
      isGalcams,
      policyData
    });

    setCommonSupport(comm);
    setAdditionalSupport(addComm);
    setSelectiveAdditionalSupport(addSel);
    setAdditionalEdited(true);
  }, [selectedDevice, selectedPlan, operator, isGalcams, joinType, plans, policyData]);

  const devicePrice = useMemo(()=> DEVICE_LIST.find(d=>d.name===selectedDevice)?.price || 0, [selectedDevice]);

  const totalDiscount_Public = commonSupport + additionalSupport;
  const principal_Public = Math.max(0, devicePrice - totalDiscount_Public - doubleStorageDiscount);
  const monthlyDevice_Public = installMonths === 0 ? 0 : Math.round(pmt(interestRate/12, installMonths, principal_Public));

  const principal_Selective = Math.max(0, devicePrice - selectiveAdditionalSupport - doubleStorageDiscount);
  const monthlyDevice_Selective = installMonths === 0 ? 0 : Math.round(pmt(interestRate/12, installMonths, principal_Selective));
  
  const originalPlanPrice2 = useMemo(() => plans.find(p => p.name === selectedPlan2)?.price || 0, [selectedPlan2, plans]);
  const monthlyPlanDiscount2 = useMemo(() => Math.round(originalPlanPrice2 * 0.25), [originalPlanPrice2]);
  
  const totalMonthly_Public2 = monthlyDevice_Public + originalPlanPrice2;
  const planPrice_Selective2 = Math.round(originalPlanPrice2 * 0.75);
  const totalMonthly_Selective2 = monthlyDevice_Selective + planPrice_Selective2;

  const totalInterest_Public = installMonths === 0 ? 0 : Math.max(0, (monthlyDevice_Public * installMonths) - principal_Public);
  const totalInterest_Selective = installMonths === 0 ? 0 : Math.max(0, (monthlyDevice_Selective * installMonths) - principal_Selective);
  const monthlyInterest_Public = installMonths === 0 ? 0 : Math.max(0, monthlyDevice_Public - Math.round(principal_Public / installMonths));
  const monthlyInterest_Selective = installMonths === 0 ? 0 : Math.max(0, monthlyDevice_Selective - Math.round(principal_Selective / installMonths));

  // 6개월 누적 식 가중 정산 산출
  const originalPlanPrice = useMemo(() => plans.find(p => p.name === selectedPlan)?.price || 0, [selectedPlan, plans]);
  const totalMonthly_Public = monthlyDevice_Public + originalPlanPrice;
  const planPrice_Selective = Math.round(originalPlanPrice * 0.75);
  const totalMonthly_Selective = monthlyDevice_Selective + planPrice_Selective;

// 일시불(0개월)일 경우 기기값을 명시적으로 합산해주도록 변경
const totalCost2_Public = installMonths === 0 
  ? principal_Public + (originalPlanPrice * 6) + (originalPlanPrice2 * 18)
  : (totalMonthly_Public * 6) + (totalMonthly_Public2 * 18);

const totalCost2_Selective = installMonths === 0 
  ? principal_Selective + (planPrice_Selective * 6) + (planPrice_Selective2 * 18)
  : (totalMonthly_Selective * 6) + (totalMonthly_Selective2 * 18);
  const diff2 = Math.abs(totalCost2_Public - totalCost2_Selective);
  const winner2 = totalCost2_Public < totalCost2_Selective ? '공통지원' : (totalCost2_Selective < totalCost2_Public ? '선택약정' : '동일');

  const highlightClassPublic2 = totalCost2_Public < totalCost2_Selective ? 'bg-green-50 ring-2 ring-green-500 z-10' : 'bg-white';
  const highlightClassSelective2 = totalCost2_Selective < totalCost2_Public ? 'bg-green-50 ring-2 ring-green-500 z-10' : 'bg-white';

  const handleContractTypeChange = (newType) => setContractType(newType);

  return (
    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
      <div className="bg-white py-2 px-5 rounded-lg shadow-xl relative w-[880px] max-w-[95vw] max-h-[95vh] overflow-y-auto border-4 border-indigo-200">

        {/* 상단 컨트롤러 */}

          <div className="flex flex-col w-[350px] shrink-0">
            <div className="text-red-500 font-bold text-[13px] mb-1 text-center w-full whitespace-nowrap">개통 요금제</div>
            <div className="relative w-full" ref={planDropdownRef}>
              <input type="text" value={planSearchTerm} onChange={(e) => { setPlanSearchTerm(e.target.value); setIsPlanDropdownOpen(true); }} onClick={(e) => { setIsPlanDropdownOpen(true); e.target.select(); }} placeholder="요금제 검색..." className="border p-2 rounded w-full outline-none focus:ring-2 focus:ring-blue-500 h-[38px]" />
              {isPlanDropdownOpen && (
                <div className="absolute z-[60] w-max min-w-full mt-1 bg-white border border-gray-300 rounded shadow-lg max-h-60 overflow-y-auto">
                  {filteredPlans.length > 0 ? (
                    filteredPlans.map(p => (
                      <div key={p.name} onClick={() => { setSelectedPlan(p.name); setPlanSearchTerm(`${p.name} (${p.price.toLocaleString()}원)`); setIsPlanDropdownOpen(false); }} className={`px-3 py-2 cursor-pointer hover:bg-blue-50 text-sm border-b last:border-b-0 whitespace-nowrap ${selectedPlan === p.name ? 'bg-blue-100 font-bold' : ''}`}>
                        <span className="text-gray-500 text-xs mr-1">[{p.category}]</span> {formatPlanName(p.name)} <span className="text-gray-700 ml-1">({p.price.toLocaleString()}원)</span>
                      </div>
                    ))
                  ) : ( <div className="px-3 py-2 text-sm text-gray-500 text-center">검색 결과가 없습니다.</div> )}
                </div>
              )}
            </div>
          </div>
          <select value={installMonths} onChange={e=>setInstallMonths(Number(e.target.value))} className="border p-2 rounded w-[72px] md:w-24 text-center outline-none focus:ring-2 focus:ring-blue-500 h-[38px] shrink-0">
            {[0,3,6,9,10,12,18,24,30,36,48].map(m=><option key={m} value={m}>{m===0?'일시불':m+'개월'}</option>)}
          </select>
        </div>

        {/* 하단 컨트롤러 */}
        <div className="mb-2 flex flex-nowrap items-end gap-1.5 w-full">
          <div className="flex flex-col shrink-0">
            <label className="text-sm text-center">공통지원금</label>
            <input type="text" value={commonSupport.toLocaleString()} disabled={contractType === '선택약정'} onChange={e => { setCommonSupport(Number(e.target.value.replace(/\D/g, '')) || 0); setAdditionalEdited(false); }} className={`border p-1 rounded w-24 text-center ${contractType === '선택약정' ? 'bg-gray-200 text-gray-400' : 'bg-white'}`} onFocus={e=>e.target.select()} />
          </div>
          <div className="flex flex-col shrink-0">
            <label className="text-sm text-center">추가지원금</label>
            <input type="text" value={(contractType === '공통지원' ? additionalSupport : selectiveAdditionalSupport).toLocaleString()} onChange={e => { const v = Number(e.target.value.replace(/\D/g, '')) || 0; if (contractType === '공통지원') { setAdditionalSupport(v); setAdditionalEdited(true); } else { setSelectiveAdditionalSupport(v); } }} className="border p-1 rounded w-24 text-center bg-white" onFocus={e=>e.target.select()} />
          </div>
          <div className="flex flex-col shrink-0">
            <div className="flex border rounded overflow-hidden h-[34px]">
              <button onClick={()=>handleContractTypeChange('공통지원')} className={`px-2 text-sm transition-colors whitespace-nowrap ${contractType==='공통지원'?'bg-blue-600 text-white':'bg-white text-gray-700 hover:bg-gray-100'}`}>공통지원</button>
              <div className="border-l"></div>
              <button onClick={()=>handleContractTypeChange('선택약정')} className={`px-2 text-sm transition-colors whitespace-nowrap ${contractType==='선택약정'?'bg-blue-600 text-white':'bg-white text-gray-700 hover:bg-gray-100'}`}>선택약정</button>
            </div>
          </div>
          <div className="flex flex-col shrink-0">
             <label className="text-sm mb-1 text-center">&nbsp;</label>
             <div className="flex gap-1.5 items-center h-[34px]">
              <div className="flex gap-2 items-center h-full bg-white border border-gray-300 px-2 rounded">
                <label className="flex items-center text-[13px] cursor-pointer text-gray-700 whitespace-nowrap font-medium">
                  <input type="radio" value="기기변경" checked={joinType === '기기변경'} onChange={() => setJoinType('기기변경')} className="mr-1 w-3.5 h-3.5 text-blue-600 focus:ring-blue-500" />기기변경
                </label>
                <label className="flex items-center text-[13px] cursor-pointer text-gray-700 whitespace-nowrap font-medium">
                  <input type="radio" value="번호이동" checked={joinType === '번호이동'} onChange={() => setJoinType('번호이동')} className="mr-1 w-3.5 h-3.5 text-blue-600 focus:ring-blue-500" />번호이동
                </label>

                </label>

              <div className="relative w-full" ref={planDropdownRef2}>

                {isPlanDropdownOpen2 && (
                  <div className="absolute z-[60] min-w-full w-max mt-1 bg-white border border-gray-300 rounded shadow-lg max-h-60 overflow-y-auto">
                    {filteredPlans2.length > 0 ? (
                      filteredPlans2.map(p => (
                        <div key={p.name} onClick={() => { setSelectedPlan2(p.name); setPlanSearchTerm2(`${p.name} (${p.price.toLocaleString()}원)`); setIsPlanDropdownOpen2(false); }} className={`px-3 py-2 cursor-pointer hover:bg-blue-50 text-sm border-b last:border-b-0 whitespace-nowrap ${selectedPlan2 === p.name ? 'bg-blue-100 font-bold' : ''}`}>
                          <span className="text-gray-500 text-xs mr-1">[{p.category}]</span> {formatPlanName(p.name)} <span className="text-gray-700 ml-1">({p.price.toLocaleString()}원)</span>
                        </div>
                      ))
                    ) : ( <div className="px-3 py-2 text-sm text-gray-500 text-center whitespace-nowrap">검색 결과가 없습니다.</div> )}
                  </div>
                )}
              </div>
            </div>
          </div>

          <div className="relative grid grid-cols-1 md:grid-cols-2 gap-3 mb-7 w-full mt-auto">
            <CostCard
              title="공통지원"
              type="public"
              planName={selectedPlan2}
              planPrice={originalPlanPrice2}
              devicePrice={devicePrice}
              isPreorderDevice={isPreorderDevice}
              doubleStorageDiscount={doubleStorageDiscount}
              commonSupport={commonSupport}
              additionalSupport={additionalSupport}
              principal={principal_Public}
              installMonths={installMonths}
              monthlyDevice={monthlyDevice_Public}
              monthlyInterest={monthlyInterest_Public}
              totalInterest={totalInterest_Public}
              totalMonthly={totalMonthly_Public2}
              totalCostLabel="총 유지비용"
              totalCostValue={totalCost2_Public}
              totalCostSubtext={
  installMonths === 0 
    ? `기기값 ${principal_Public.toLocaleString()}원 + ${(originalPlanPrice * 6).toLocaleString()}원(6개월) + ${(originalPlanPrice2 * 18).toLocaleString()}원(18개월)`
    : `(${totalMonthly_Public.toLocaleString()}원 × 6개월 + ${totalMonthly_Public2.toLocaleString()}원 × 18개월)`
}
              highlightClass={highlightClassPublic2}
              arrowColor="text-blue-600"
            />

            <CostCard
              title="선택약정 (25% 요금할인)"
              type="selective"
              planName={selectedPlan2}
              planPrice={originalPlanPrice2}
              planDiscount={monthlyPlanDiscount2}
              devicePrice={devicePrice}
              isPreorderDevice={isPreorderDevice}
              doubleStorageDiscount={doubleStorageDiscount}
              additionalSupport={selectiveAdditionalSupport}
              principal={principal_Selective}
              installMonths={installMonths}
              monthlyDevice={monthlyDevice_Selective}
              monthlyInterest={monthlyInterest_Selective}
              totalInterest={totalInterest_Selective}
              totalMonthly={totalMonthly_Selective2}
              totalCostLabel="총 유지비용"
              totalCostValue={totalCost2_Selective}
              totalCostSubtext={
  installMonths === 0 
    ? `기기값 ${principal_Selective.toLocaleString()}원 + ${(planPrice_Selective * 6).toLocaleString()}원(6개월) + ${(planPrice_Selective2 * 18).toLocaleString()}원(18개월)`
    : `(${totalMonthly_Selective.toLocaleString()}원 × 6개월 + ${totalMonthly_Selective2.toLocaleString()}원 × 18개월)`
}
              highlightClass={highlightClassSelective2}
              arrowColor="text-blue-600"
            />
            
            {diff2 > 0 && (
              <div className="hidden md:flex absolute -bottom-8 left-1/2 -translate-x-1/2 bg-white border-2 border-blue-500 text-blue-600 font-extrabold text-[15px] px-5 py-1 rounded-full shadow-[0_4px_12px_rgba(0,0,0,0.15)] z-20 items-center justify-center whitespace-nowrap">
                {winner2} {diff2.toLocaleString()}원 더 유리함
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ------------------ 계산기 컴포넌트 ------------------
function Calculator({
  plans, features, operator, policyData,
  setShowRequestFormPopup, setShowDeviceColorPopup, setShowPlanSummaryPopup, showMaintenancePopup, setShowMaintenancePopup
}) {
  const [selectedDevice, setSelectedDevice] = useState(CATEGORIZED_DEVICE_LIST[0].devices[0].name);
  const [selectedPlan, setSelectedPlan] = useState(plans[0]?.name || '');
  const [installMonths, setInstallMonths] = useState(24);
  const [interestRate] = useState(0.059);
  
  const [commonSupport, setCommonSupport] = useState(0);
  const [additionalSupport, setAdditionalSupport] = useState(0);
  const [selectiveAdditionalSupport, setSelectiveAdditionalSupport] = useState(0); 
  const [, setAdditionalEdited] = useState(false);
  const [contractType, setContractType] = useState('공통지원');
  
  const [joinType, setJoinType] = useState('기기변경');
  const [isGalcams, setIsGalcams] = useState(false);

  const [planSearchTerm, setPlanSearchTerm] = useState('');
  const [isPlanDropdownOpen, setIsPlanDropdownOpen] = useState(false);
  const planDropdownRef = useRef(null);

  const [isColorDropdownOpen, setIsColorDropdownOpen] = useState(false);
  const colorDropdownRef = useRef(null);

  const isPreorderDevice = useMemo(() => {
    const preorderCategory = CATEGORIZED_DEVICE_LIST.find(c => c.category === '사전예약');
    return preorderCategory ? preorderCategory.devices.some(d => d.name === selectedDevice) : false;
  }, [selectedDevice]);

  const doubleStorageDiscount = isPreorderDevice ? PREORDER_DOUBLE_STORAGE_DISCOUNT : 0;

  useEffect(() => { 
    setSelectedPlan(plans[0]?.name || ''); 
  }, [plans]);

  useEffect(() => {
    const handleClickOutside = (event) => {
      if (colorDropdownRef.current && !colorDropdownRef.current.contains(event.target)) {
        setIsColorDropdownOpen(false);
      }
    };
    document.addEventListener("mousedown", handleClickOutside);
    return () => document.removeEventListener("mousedown", handleClickOutside);
  }, []);

  const handleColorCopy = (copyText) => {
    navigator.clipboard.writeText(copyText).then(() => {
      alert("모델명이 복사되었습니다.");
      setIsColorDropdownOpen(false);
    });
  };

  const currentColors = DEVICE_COLORS_MAP[selectedDevice] || [];

  useEffect(() => {
    const plan = plans.find(p => p.name === selectedPlan);
    setPlanSearchTerm(plan ? `${plan.name} (${plan.price.toLocaleString()}원)` : selectedPlan);
  }, [selectedPlan, plans]);

  useEffect(() => {
    const handleClickOutside = (event) => {
      if (planDropdownRef.current && !planDropdownRef.current.contains(event.target)) {
        setIsPlanDropdownOpen(false);
        const plan = plans.find(p => p.name === selectedPlan);
        setPlanSearchTerm(plan ? `${plan.name} (${plan.price.toLocaleString()}원)` : selectedPlan);
      }
    };
    document.addEventListener("mousedown", handleClickOutside);
    return () => document.removeEventListener("mousedown", handleClickOutside);
  }, [selectedPlan, plans]);

  const filteredPlans = useMemo(() => {
    const term = planSearchTerm.trim().toLowerCase();
    const plan = plans.find(p => p.name === selectedPlan);
    const formattedSelected = plan ? `${plan.name} (${plan.price.toLocaleString()}원)`.toLowerCase() : selectedPlan.toLowerCase();
    
    if (!term || term === formattedSelected) return plans;
    return plans.filter(p => 
      (p.name || '').toLowerCase().includes(term) || 
      p.price.toString().includes(term.replace(/,/g, '')) ||
      (p.category || '').toLowerCase().includes(term)
    );
  }, [plans, planSearchTerm, selectedPlan]);

  const originalPlanPrice = useMemo(() => plans.find(p => p.name === selectedPlan)?.price || 0, [selectedPlan, plans]);

  useEffect(() => {
    setIsGalcams(false);
  }, [operator, selectedDevice]);

  // 통합 분리된 연동 지원금 계산 함수 실행 및 상태 업데이트
  useEffect(() => {
    const planInfo = plans.find(p => p.name === selectedPlan);
    const planPrice = planInfo ? planInfo.price : 0;

    const { commonSupport: comm, additionalSupport: addComm, selectiveAdditionalSupport: addSel } = getSupportAmounts({
      selectedDevice,
      selectedPlanPrice: planPrice,
      operator,
      joinType,
      isGalcams,
      policyData
    });

    setCommonSupport(comm);
    setAdditionalSupport(addComm);
    setSelectiveAdditionalSupport(addSel);
    setAdditionalEdited(true);
  }, [selectedDevice, selectedPlan, operator, isGalcams, joinType, plans, policyData]);

  const devicePrice = useMemo(()=> DEVICE_LIST.find(d=>d.name===selectedDevice)?.price || 0, [selectedDevice]);
  const monthlyPlanDiscount = useMemo(() => Math.round(originalPlanPrice * 0.25), [originalPlanPrice]);
  const totalPlanDiscount = useMemo(() => monthlyPlanDiscount * 24, [monthlyPlanDiscount]);
  const featureText = useMemo(() => {
    if (!selectedPlan) return '';
    if (features[selectedPlan]) return features[selectedPlan];
    
    const normalizeStr = (str) => {
      let s = (str || '').replace(/\s+/g, '').replace(/\(가입중단\)/g, '');
      if (s === '스페셜A') return '데이터스페셜A';
      if (s === '스페셜B') return '데이터스페셜B';
      return s;
    };
    
    const targetKey = normalizeStr(selectedPlan);
    for (const key in features) {
      if (normalizeStr(key) === targetKey) {
        return features[key];
      }
    }
    return '';
  }, [selectedPlan, features]);

  const totalDiscount_Public = commonSupport + additionalSupport;
  const principal_Public = Math.max(0, devicePrice - totalDiscount_Public - doubleStorageDiscount);
  const monthlyDevice_Public = installMonths === 0 ? 0 : Math.round(pmt(interestRate/12, installMonths, principal_Public));
  const totalMonthly_Public = monthlyDevice_Public + originalPlanPrice;
  const totalInterest_Public = installMonths === 0 ? 0 : Math.max(0, (monthlyDevice_Public * installMonths) - principal_Public);

  const totalDiscount_Selective = selectiveAdditionalSupport + totalPlanDiscount;
  const principal_Selective = Math.max(0, devicePrice - selectiveAdditionalSupport - doubleStorageDiscount);
  const monthlyDevice_Selective = installMonths === 0 ? 0 : Math.round(pmt(interestRate/12, installMonths, principal_Selective));
  const planPrice_Selective = Math.round(originalPlanPrice * 0.75);
  const totalMonthly_Selective = monthlyDevice_Selective + planPrice_Selective;
  const totalInterest_Selective = installMonths === 0 ? 0 : Math.max(0, (monthlyDevice_Selective * installMonths) - principal_Selective);

  const monthlyInterest_Public = installMonths === 0 ? 0 : Math.max(0, monthlyDevice_Public - Math.round(principal_Public / installMonths));
  const monthlyInterest_Selective = installMonths === 0 ? 0 : Math.max(0, monthlyDevice_Selective - Math.round(principal_Selective / installMonths));

// 1. 총비용을 먼저 계산합니다.
const total24_Public = principal_Public + totalInterest_Public + (originalPlanPrice * 24);
const total24_Selective = principal_Selective + totalInterest_Selective + (planPrice_Selective * 24);

// 2. 초록색 테두리(유리함 표시) 기준을 계산된 '총 24개월 총비용' 기준으로 비교합니다.
const highlightClassPublic = total24_Public < total24_Selective ? 'bg-green-50 ring-2 ring-green-500 z-10' : 'bg-white';
const highlightClassSelective = total24_Selective < total24_Public ? 'bg-green-50 ring-2 ring-green-500 z-10' : 'bg-white';

const diffMain = Math.abs(total24_Public - total24_Selective);
const winnerMain = total24_Public < total24_Selective ? '공통지원' : (total24_Selective < total24_Public ? '선택약정' : '동일');

  const handleContractTypeChange = (newType) => setContractType(newType);

  return (
    <div className="pt-2 pb-6 px-4 max-w-4xl mx-auto">
      <div className="mb-3 flex flex-nowrap gap-1.5 md:gap-2 items-center w-full">
        <div className="flex gap-1 shrink-0 relative w-[50%] md:w-[45%]" ref={colorDropdownRef}>
          <select value={selectedDevice} onChange={e=>setSelectedDevice(e.target.value)} className="border p-2 rounded flex-1 min-w-0 outline-none focus:ring-2 focus:ring-blue-500 h-[38px]">
            {CATEGORIZED_DEVICE_LIST.map(group => (
              <optgroup key={group.category} label={group.category}>
                {group.devices.map(d => (
                  <option 
                    key={d.name} 
                    value={d.name} 
                    style={d.isHighlight ? { fontWeight: 'bold', color: '#1D4ED8' } : d.isGreen ? { fontWeight: 'bold', color: '#059669' } : d.isPurple ? { fontWeight: 'bold', color: '#9333EA' } : {}}
                  >
                    {d.name} ({d.price.toLocaleString()}원)
                  </option>
                ))}
              </optgroup>
            ))}
          </select>
          <button type="button" onClick={() => setIsColorDropdownOpen(!isColorDropdownOpen)} className="bg-gray-500 text-white px-2.5 md:px-3 rounded hover:bg-gray-600 text-[13px] font-medium whitespace-nowrap shrink-0 h-[38px]">
            모델명
          </button>
          {isColorDropdownOpen && (
            <div className="absolute top-[40px] left-0 mt-1 z-[60] w-max min-w-[150px] bg-white border border-gray-300 rounded shadow-lg overflow-hidden max-h-60 overflow-y-auto">
              {currentColors.length > 0 ? (
                currentColors.map((c, idx) => (
                  <div key={idx} onClick={() => handleColorCopy(c.copyText)} className="px-3 py-2 cursor-pointer hover:bg-blue-50 text-sm border-b last:border-b-0 text-gray-800">
                    {c.name}
                  </div>
                ))
              ) : (
                <div onClick={() => handleColorCopy(selectedDevice)} className="px-3 py-2 cursor-pointer hover:bg-gray-100 text-sm text-gray-500">
                  색상 설정 없음<br/><span className="text-xs text-gray-400">(모델명만 복사)</span>
                </div>
              )}
            </div>
          )}
        </div>
        
        <div className="relative flex-1 min-w-[100px]" ref={planDropdownRef}>
          <input type="text" value={planSearchTerm} onChange={(e) => { setPlanSearchTerm(e.target.value); setIsPlanDropdownOpen(true); }} onClick={(e) => { setIsPlanDropdownOpen(true); e.target.select(); }} placeholder="요금제 검색..." className="border p-2 rounded w-full outline-none focus:ring-2 focus:ring-blue-500 h-[38px]" />
          {isPlanDropdownOpen && (
            <div className="absolute z-50 w-full mt-1 bg-white border border-gray-300 rounded shadow-lg max-h-60 overflow-y-auto">
              {filteredPlans.length > 0 ? (
                filteredPlans.map(p => (
                  <div key={p.name} onClick={() => { setSelectedPlan(p.name); setPlanSearchTerm(`${p.name} (${p.price.toLocaleString()}원)`); setIsPlanDropdownOpen(false); }} className={`px-3 py-2 cursor-pointer hover:bg-blue-50 text-sm border-b last:border-b-0 ${selectedPlan === p.name ? 'bg-blue-100 font-bold' : ''}`}>
                    <span className="text-gray-500 text-xs mr-1">[{p.category}]</span> {formatPlanName(p.name)} <span className="text-gray-700 ml-1">({p.price.toLocaleString()}원)</span>
                  </div>
                ))
              ) : ( <div className="px-3 py-2 text-sm text-gray-500 text-center">검색 결과가 없습니다.</div> )}
            </div>
          )}
        </div>
        <select value={installMonths} onChange={e=>setInstallMonths(Number(e.target.value))} className="border p-2 rounded w-[70px] md:w-24 text-center outline-none focus:ring-2 focus:ring-blue-500 shrink-0 h-[38px]">
          {[0,3,6,9,10,12,18,24,30,36,48].map(m=><option key={m} value={m}>{m===0?'일시불':m+'개월'}</option>)}
        </select>
      </div>

      <div className="mb-3 flex flex-nowrap items-end gap-1.5 w-full">
        <div className="flex flex-col shrink-0">
          <label className="text-sm text-center">공통지원금</label>
          <input type="text" value={commonSupport.toLocaleString()} disabled={contractType === '선택약정'} onChange={e => { setCommonSupport(Number(e.target.value.replace(/\D/g, '')) || 0); setAdditionalEdited(false); }} className={`border p-1 rounded w-24 text-center ${contractType === '선택약정' ? 'bg-gray-200 text-gray-400' : 'bg-white'}`} onFocus={e=>e.target.select()} />
        </div>
        <div className="flex flex-col shrink-0">
          <label className="text-sm text-center">추가지원금</label>
          <input type="text" value={(contractType === '공통지원' ? additionalSupport : selectiveAdditionalSupport).toLocaleString()} onChange={e => { const v = Number(e.target.value.replace(/\D/g, '')) || 0; if (contractType === '공통지원') { setAdditionalSupport(v); setAdditionalEdited(true); } else { setSelectiveAdditionalSupport(v); } }} className="border p-1 rounded w-24 text-center bg-white" onFocus={e=>e.target.select()} />
        </div>
        <div className="flex flex-col shrink-0">
          <div className="flex border rounded overflow-hidden h-[34px]">
            <button onClick={()=>handleContractTypeChange('공통지원')} className={`px-2 text-sm transition-colors whitespace-nowrap ${contractType==='공통지원'?'bg-blue-600 text-white':'bg-white text-gray-700 hover:bg-gray-100'}`}>공통지원</button>
            <div className="border-l"></div>
            <button onClick={()=>handleContractTypeChange('선택약정')} className={`px-2 text-sm transition-colors whitespace-nowrap ${contractType==='선택약정'?'bg-blue-600 text-white':'bg-white text-gray-700 hover:bg-gray-100'}`}>선택약정</button>
          </div>
        </div>
        <div className="flex flex-col shrink-0">
           <label className="text-sm mb-1 text-center">&nbsp;</label>
           <div className="flex gap-1.5 items-center h-[34px]">
            <div className="flex gap-2 items-center h-full bg-white border border-gray-300 px-2 rounded">
              <label className="flex items-center text-[13px] cursor-pointer text-gray-700 whitespace-nowrap font-medium">
                <input type="radio" value="기기변경" checked={joinType === '기기변경'} onChange={() => setJoinType('기기변경')} className="mr-1 w-3.5 h-3.5 text-blue-600 focus:ring-blue-500" />기기변경
              </label>
              <label className="flex items-center text-[13px] cursor-pointer text-gray-700 whitespace-nowrap font-medium">
                <input type="radio" value="번호이동" checked={joinType === '번호이동'} onChange={() => setJoinType('번호이동')} className="mr-1 w-3.5 h-3.5 text-blue-600 focus:ring-blue-500" />번호이동
              </label>
              <div className="border-l border-gray-300 h-4 mx-1"></div>
              <label className="flex items-center text-[13px] cursor-pointer text-gray-700 whitespace-nowrap font-medium">
                <input type="checkbox" checked={isGalcams} onChange={() => setIsGalcams(!isGalcams)} className="mr-1 w-3.5 h-3.5 text-blue-600 rounded border-gray-300 focus:ring-blue-500" />갤캠스
              </label>
            </div>
            <button onClick={() => setShowPlanSummaryPopup(true)} className="bg-blue-500 text-white px-2.5 rounded hover:bg-blue-600 h-[34px] flex items-center justify-center text-[13px] font-medium whitespace-nowrap">요금제 정리</button>
            <button onClick={() => setShowRequestFormPopup(true)} className="bg-purple-600 text-white px-2.5 rounded hover:bg-purple-700 h-[34px] flex items-center justify-center text-[13px] font-medium whitespace-nowrap">요청 양식</button>
            <button onClick={() => setShowDeviceColorPopup(true)} className="bg-pink-600 text-white px-2.5 rounded hover:bg-pink-700 h-[34px] flex items-center justify-center text-[13px] font-medium whitespace-nowrap">이벤트</button>
           </div>
        </div>
      </div>

      <div className="mt-3">
        {featureText && (
          <div className="p-2.5 rounded-lg shadow-sm border border-blue-200 bg-blue-50 mb-3 text-center leading-relaxed">
            <span className="font-bold text-blue-800 mr-2 inline-block">요금제 혜택:</span>
            <span className="text-blue-700 text-[15px]">
              {featureText.split('/').map((item, index, array) => (
                <span key={index} className="inline-block break-keep">
                  {item}{index < array.length - 1 ? ' / ' : ''}
                </span>
              ))}
            </span>
          </div>
        )}
        
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 relative mb-7">
          <CostCard
            title="공통지원"
            type="public"
            planName={selectedPlan}
            planPrice={originalPlanPrice}
            devicePrice={devicePrice}
            isPreorderDevice={isPreorderDevice}
            doubleStorageDiscount={doubleStorageDiscount}
            commonSupport={commonSupport}
            additionalSupport={additionalSupport}
            principal={principal_Public}
            installMonths={installMonths}
            monthlyDevice={monthlyDevice_Public}
            monthlyInterest={monthlyInterest_Public}
            totalInterest={totalInterest_Public}
            totalMonthly={totalMonthly_Public}
            totalCostLabel="총 유지비용"
            totalCostValue={total24_Public}
            totalCostSubtext={
              installMonths === 0 
                ? `(기기값 ${principal_Public.toLocaleString()}원 + 요금 ${originalPlanPrice.toLocaleString()}원×24개월 ${(originalPlanPrice * 24).toLocaleString()}원)`
                : `(${totalMonthly_Public.toLocaleString()}원 × 24개월)`
            }
            highlightClass={highlightClassPublic}
            arrowColor="text-red-600"
          />

          <CostCard
            title="선택약정 (25% 요금할인)"
            type="selective"
            planName={selectedPlan}
            planPrice={originalPlanPrice}
            planDiscount={monthlyPlanDiscount}
            devicePrice={devicePrice}
            isPreorderDevice={isPreorderDevice}
            doubleStorageDiscount={doubleStorageDiscount}
            additionalSupport={selectiveAdditionalSupport}
            principal={principal_Selective}
            installMonths={installMonths}
            monthlyDevice={monthlyDevice_Selective}
            monthlyInterest={monthlyInterest_Selective}
            totalInterest={totalInterest_Selective}
            totalMonthly={totalMonthly_Selective}
            totalCostLabel="총 유지비용"
            totalCostValue={total24_Selective}
            totalCostSubtext={
              installMonths === 0 
                ? `(기기값 ${principal_Selective.toLocaleString()}원 + 요금 ${planPrice_Selective.toLocaleString()}원×24개월 ${(planPrice_Selective * 24).toLocaleString()}원)`
                : `(${totalMonthly_Selective.toLocaleString()}원 × 24개월)`
            }
            highlightClass={highlightClassSelective}
            arrowColor="text-red-600"
          />

          {diffMain > 0 && (
            <div className="hidden md:flex absolute -bottom-8 left-1/2 -translate-x-1/2 bg-white border-2 border-blue-500 text-blue-600 font-extrabold text-[15px] px-5 py-1 rounded-full shadow-[0_4px_12px_rgba(0,0,0,0.15)] z-20 items-center justify-center whitespace-nowrap">
              요금제 24개월 유지 시 총 비용 : {winnerMain} {diffMain.toLocaleString()}원 더 유리함
            </div>
          )}
        </div>
      </div>
      
      {showMaintenancePopup && (
        <MaintenanceCostPopup 
          onClose={() => setShowMaintenancePopup(false)} 
          operator={operator}
          plans={plans}
          features={features}
          policyData={policyData}
          initialData={{
            selectedDevice, selectedPlan, installMonths, commonSupport,
            additionalSupport, selectiveAdditionalSupport, additionalEdited: true,
            contractType, joinType, isGalcams
          }}
        />
      )}
    </div>
  );
}

function App() {

const handleFileUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const processRecords = (records, delimiter) => {
        let storeIdx = -1;
        let dotcomIdx = -1; 
        let usimIdx = -1;
        let planIdx = -1;
        let addrIdx = -1; 
        let dateIdx = -1; // 💡 '상담희망일시' 열 위치 저장할 변수 추가!
        
        for (let i = 0; i < Math.min(records.length, 10); i++) {
            if (records[i].includes('구분') || records[i].includes('상담희망일시')) {
                const headers = records[i].split(delimiter).map(h => h.trim().replace(/"/g, ''));
                storeIdx = headers.findIndex(h => h === '매장' || h === '매장명' || h.includes('매장'));
                dotcomIdx = headers.findIndex(h => h.includes('닷컴상태'));
                usimIdx = headers.findIndex(h => h.includes('유심모델'));
                planIdx = headers.findIndex(h => h === '요금제' || h.includes('요금제'));
                addrIdx = headers.findIndex(h => h === '주소' || h.includes('주소')); 
                dateIdx = headers.findIndex(h => h === '상담희망일시' || h.includes('희망일시')); // 💡 위치 찾기
                break;
            }
        }

        const timeGroups = { '09시 ~ 13시': [], '13시 ~ 15시': [], '15시 ~ 17시': [] };
        const allKnownPlans = [...PLAN_LIST_KT, ...PLAN_LIST_U].map(p => p.name.replace(/\s*\(가입\s*중단\)/g, '').trim()).sort((a, b) => b.length - a.length);

        records.forEach(record => {
            if (record.includes('구분') && record.includes('상담희망일시')) return; 

            let timeMatch = record.match(/(09:00\s*~\s*13:00|13:00\s*~\s*15:00|15:00\s*~\s*17:00|09시\s*~\s*13시|13시\s*~\s*15시|15시\s*~\s*17시)/);
            if (!timeMatch) return;
            
            let timeStr = timeMatch[1].replace(/\s/g, '');
            let timeKey = timeStr.includes('09') ? '09시 ~ 13시' : timeStr.includes('13') ? '13시 ~ 15시' : '15시 ~ 17시';
            
            const getVal = (regex) => (record.match(regex) || [])[1] || '';
            
            let cat = getVal(/(택배|BOPIS|스마트픽|픽업|매장방문|퀵배송)/);
            
            let storeName = '';
            if (storeIdx !== -1) {
                const cols = record.split(delimiter);
                if (cols.length > storeIdx) { storeName = cols[storeIdx].trim().replace(/"/g, '').split(/\r?\n/)[0].trim(); }
            }
            if (!storeName || storeName.includes('09') || storeName.includes('13') || storeName.includes('15')) {
                let timeMatchForStore = record.match(/(?:09:00\s*~\s*13:00|13:00\s*~\s*15:00|15:00\s*~\s*17:00|09시\s*~\s*13시|13시\s*~\s*15시|15시\s*~\s*17시)[ ]*,?[ ]*\t?[ ]*([^\t\n,]+)/);
                if (timeMatchForStore) { storeName = timeMatchForStore[1].trim(); }
            }
            storeName = storeName.replace(/(09:00\s*~\s*13:00|13:00\s*~\s*15:00|15:00\s*~\s*17:00|09시\s*~\s*13시|13시\s*~\s*15시|15시\s*~\s*17시)/g, '').trim();
            if ((cat === 'BOPIS' || cat === '퀵배송') && storeName) { cat = `${cat}(${storeName})`; }

            let namePhoneMatch = record.match(/(?:[가-힣]{2,5}[,\s\t]+)?([가-힣]{2,5})[,\s\t]+(010-\d{3,4}-\d{4})/);
            const name = namePhoneMatch ? namePhoneMatch[1] : '';
            const confirm = namePhoneMatch ? namePhoneMatch[2] : '';

            let dotcomStr = dotcom ? ` ${dotcom}` : ''; 
            const info = `${changeType} / ${cat} / ${name} / ${confirm}${dotcomStr}\n\n${mappedModel}\n${plan} / ${discountType} / ${inst}\n${usim}\n${addr}`;
            
            timeGroups[timeKey].push(info.replace(/\n{3,}/g, '\n\n'));
        });

        let finalOutput = '';
        ['09시 ~ 13시', '13시 ~ 15시', '15시 ~ 17시'].forEach((time, i, arr) => {
            timeGroups[time].reverse();

            finalOutput += `[${time}]\n\n` + (timeGroups[time].length > 0 ? timeGroups[time].map((text, idx) => `${idx + 1}. ${text}`).join('\n\n\n') + '\n\n' : '\n');
            if (i < arr.length - 1) finalOutput += '===============================\n';

        <button className={`px-4 py-2 rounded text-sm font-bold shrink-0 ${operator === 'U' ? 'bg-green-600 text-white shadow' : 'bg-white border'}`} onClick={() => setOperator('U')}>U+</button>
        
        {operator === 'KT' && <a href="https://shop.kt.com/smart/supportAmtList.do" target="_blank" className="bg-blue-500 text-white px-3 py-2 rounded hover:bg-blue-600 text-sm whitespace-nowrap shrink-0">KT 지원금</a>}
        {operator === 'U' && <a href="https://www.lguplus.com/mobile/financing-model" target="_blank" className="bg-green-500 text-white px-3 py-2 rounded hover:bg-green-600 text-sm whitespace-nowrap shrink-0">U+ 지원금</a>}

        <a href="https://www.samsung.com/sec/smartphones/all-smartphones/?carrier-phone" target="_blank" className="bg-gray-800 text-white px-3 py-2 rounded hover:bg-gray-900 text-sm whitespace-nowrap shrink-0">닷컴</a>
        <button onClick={() => setShowMaintenancePopup(true)} className="bg-indigo-600 text-white px-3 h-[36px] flex items-center justify-center rounded hover:bg-indigo-700 text-sm font-medium shadow whitespace-nowrap shrink-0">유지비</button>
        <button onClick={() => setShowStorePopup(true)} className="bg-emerald-600 text-white px-3 py-2 rounded hover:bg-emerald-700 text-sm whitespace-nowrap shrink-0">MVNO</button>
        <button onClick={() => setShowPopup(true)} className="bg-gray-600 text-white px-3 py-2 rounded hover:bg-gray-700 text-sm whitespace-nowrap shrink-0">전화번호</button>
        
        <button onClick={() => fileInputRef.current.click()} className="bg-amber-500 text-white px-3 py-2 rounded hover:bg-amber-600 text-sm font-bold whitespace-nowrap shrink-0">관리</button>
        
        <div className="flex items-center ml-auto gap-1.5 shrink-0">
          <div className="relative w-40 h-[36px]">
            <input 
              type="text" 
              value={addressSearchTerm} 
              onChange={(e) => setAddressSearchTerm(e.target.value)} 
              onKeyDown={(e) => e.key === 'Enter' && handleModelSearch()} 
              placeholder="모델명 검색" 
              className="absolute top-0 left-0 border p-2 rounded w-40 focus:w-72 h-[36px] text-sm text-center focus:text-left placeholder-gray-700 border-green-400 focus:border-green-500 focus:outline-none focus:shadow-xl transition-all duration-300 z-10 focus:z-50 bg-white" 
              onFocus={(e) => e.target.placeholder = ''} 
              onBlur={(e) => e.target.placeholder = '모델명 검색'} 
            />
          </div>
          <input type="text" value={trackingNumber} onChange={(e) => setTrackingNumber(e.target.value.replace(/\D/g, ''))} onKeyDown={(e) => e.key === 'Enter' && handleTrackingSearch()} placeholder="송장번호 검색" className="border p-2 rounded w-32 h-[36px] text-sm text-center placeholder-gray-700 shrink-0" onFocus={(e) => e.target.placeholder = ''} onBlur={(e) => e.target.placeholder = 'CJ 송장번호'} />
        </div>
      </div>

      <Calculator 
        plans={plans} features={features} operator={operator} policyData={policyData}
        setShowRequestFormPopup={setShowRequestFormPopup} setShowDeviceColorPopup={setShowDeviceColorPopup} setShowPlanSummaryPopup={setShowPlanSummaryPopup} 
        showMaintenancePopup={showMaintenancePopup} setShowMaintenancePopup={setShowMaintenancePopup} 
      />
      {showPopup && <CustomerServicePopup onClose={() => setShowPopup(false)} />}
      {showRequestFormPopup && <RequestFormPopup onClose={() => setShowRequestFormPopup(false)} />}
      {showDeviceColorPopup && <DeviceColorPopup onClose={() => setShowDeviceColorPopup(false)} />}
      {showPlanSummaryPopup && <PlanSummaryPopup operator={operator} onClose={() => setShowPlanSummaryPopup(false)} />}
      {showNoticePopup && <NoticePopup onClose={() => setShowNoticePopup(false)} />}
      {showStorePopup && <StoreMapPopup onClose={() => setShowStorePopup(false)} />}

      <input type="file" accept=".csv, .txt, .crdownload, .xls, .xlsx" ref={fileInputRef} onChange={handleFileUpload} style={{ display: 'none' }} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
