function pmt(rate, nper, pv) {
  if(rate===0) return pv/nper;
  return (rate*pv)/(1-Math.pow(1+rate, -nper));
}

function normalizePlanKey(name) {
  let n = (name || '').replace(/\(.*?\)/g, '').trim();
  if (n === '스페셜 A') n = '데이터 스페셜 A';
  if (n === '스페셜 B') n = '데이터 스페셜 B';
  return n;
}

// ------------------ 독립형 유지 비용 팝업 컴포넌트 ------------------
function MaintenanceCostPopup({ onClose, operator, plans, features, initialData }) {
  const [selectedDevice, setSelectedDevice] = useState(initialData?.selectedDevice || CATEGORIZED_DEVICE_LIST[0].devices[0].name);
  const [selectedPlan, setSelectedPlan] = useState(initialData?.selectedPlan || plans[0]?.name || '');
  const [installMonths, setInstallMonths] = useState(initialData?.installMonths ?? 24);
  const [interestRate] = useState(0.059);
  
  const [commonSupport, setCommonSupport] = useState(initialData?.commonSupport || 0);
  const [additionalSupport, setAdditionalSupport] = useState(initialData?.additionalSupport || 0);
  const [selectiveAdditionalSupport, setSelectiveAdditionalSupport] = useState(initialData?.selectiveAdditionalSupport || 0); 
  const [additionalEdited, setAdditionalEdited] = useState(initialData?.additionalEdited || false);
  const [contractType, setContractType] = useState(initialData?.contractType || '공통지원');
  
  const [joinType, setJoinType] = useState(initialData?.joinType || '기기변경');
  const [isGalcams, setIsGalcams] = useState(initialData?.isGalcams || false);

  const [planSearchTerm, setPlanSearchTerm] = useState('');
  const [isPlanDropdownOpen, setIsPlanDropdownOpen] = useState(false);
  const planDropdownRef = useRef(null);

  const [selectedPlan2, setSelectedPlan2] = useState(initialData?.selectedPlan || plans[0]?.name || '');
  const [planSearchTerm2, setPlanSearchTerm2] = useState('');
  const [isPlanDropdownOpen2, setIsPlanDropdownOpen2] = useState(false);
  const planDropdownRef2 = useRef(null);
  
  const isFirstRender = useRef(true);

  // 사전예약 단말기 여부 확인
  const isPreorderDevice = useMemo(() => {
    const preorderCategory = CATEGORIZED_DEVICE_LIST.find(c => c.category === '사전예약');
    return preorderCategory ? preorderCategory.devices.some(d => d.name === selectedDevice) : false;
  }, [selectedDevice]);

  // 사전예약 단말기일 경우에만 더블 스토리지 할인 적용
  const doubleStorageDiscount = isPreorderDevice ? PREORDER_DOUBLE_STORAGE_DISCOUNT : 0;

  useEffect(() => { 
    if (!plans.some(p => p.name === selectedPlan)) setSelectedPlan(plans[0]?.name || ''); 
    if (!plans.some(p => p.name === selectedPlan2)) setSelectedPlan2(plans[0]?.name || ''); 
  }, [plans]);

  useEffect(() => {
    const plan = plans.find(p => p.name === selectedPlan);
    setPlanSearchTerm(plan ? `${plan.name} (${plan.price.toLocaleString()}원)` : selectedPlan);
  }, [selectedPlan, plans]);

  useEffect(() => {
    const handleClickOutside = (event) => {
      if (planDropdownRef.current && !planDropdownRef.current.contains(event.target)) {
        setIsPlanDropdownOpen(false);
        const plan = plans.find(p => p.name === selectedPlan);
        setPlanSearchTerm(plan ? `${plan.name} (${plan.price.toLocaleString()}원)` : selectedPlan);
      }
    };
    document.addEventListener("mousedown", handleClickOutside);
    return () => document.removeEventListener("mousedown", handleClickOutside);
  }, [selectedPlan, plans]);

  const filteredPlans = useMemo(() => {
    const term = planSearchTerm.trim().toLowerCase();
    const plan = plans.find(p => p.name === selectedPlan);
    const formattedSelected = plan ? `${plan.name} (${plan.price.toLocaleString()}원)`.toLowerCase() : selectedPlan.toLowerCase();
    
    if (!term || term === formattedSelected) return plans;
    return plans.filter(p => 
      (p.name || '').toLowerCase().includes(term) || 
      p.price.toString().includes(term.replace(/,/g, '')) ||
      (p.category || '').toLowerCase().includes(term)
    );
  }, [plans, planSearchTerm, selectedPlan]);

  useEffect(() => {
    const plan = plans.find(p => p.name === selectedPlan2);
    setPlanSearchTerm2(plan ? `${plan.name} (${plan.price.toLocaleString()}원)` : selectedPlan2);
  }, [selectedPlan2, plans]);

  useEffect(() => {
    const handleClickOutside = (event) => {
      if (planDropdownRef2.current && !planDropdownRef2.current.contains(event.target)) {
        setIsPlanDropdownOpen2(false);
        const plan = plans.find(p => p.name === selectedPlan2);
        setPlanSearchTerm2(plan ? `${plan.name} (${plan.price.toLocaleString()}원)` : selectedPlan2);
      }
    };
    document.addEventListener("mousedown", handleClickOutside);
    return () => document.removeEventListener("mousedown", handleClickOutside);
  }, [selectedPlan2, plans]);

  const filteredPlans2 = useMemo(() => {
    const term = planSearchTerm2.trim().toLowerCase();
    const plan = plans.find(p => p.name === selectedPlan2);
    const formattedSelected = plan ? `${plan.name} (${plan.price.toLocaleString()}원)`.toLowerCase() : selectedPlan2.toLowerCase();
    
    if (!term || term === formattedSelected) return plans;
    return plans.filter(p => 
      (p.name || '').toLowerCase().includes(term) || 
      p.price.toString().includes(term.replace(/,/g, '')) ||
      (p.category || '').toLowerCase().includes(term)
    );
  }, [plans, planSearchTerm2, selectedPlan2]);


  const isFirstRenderGalcams = useRef(true);
  useEffect(() => {
    if (isFirstRenderGalcams.current) {
      isFirstRenderGalcams.current = false;
      return;
    }
    setIsGalcams(false);
  }, [operator, selectedDevice]);

  useEffect(() => {
    if (isFirstRender.current) {
      isFirstRender.current = false;
      return;
    }
    const devicePolicy = POLICY.DEVICES[selectedDevice];
    const planInfo = plans.find(p => p.name === selectedPlan);
    const planPrice = planInfo ? planInfo.price : 0;

    if (devicePolicy) {
      let newCommon = 0;
      if (operator === 'U' && devicePolicy.U_COMMON && devicePolicy.U_COMMON[planPrice] !== undefined) {
        newCommon = devicePolicy.U_COMMON[planPrice];
      } else if (operator === 'KT' && devicePolicy.KT_COMMON && devicePolicy.KT_COMMON[planPrice] !== undefined) {
        newCommon = devicePolicy.KT_COMMON[planPrice];
      }
      setCommonSupport(newCommon);

      let newAddCommon = 0;
      let newAddSelective = 0;
      const extraConfig = devicePolicy.EXTRA || {};
      
      if (operator === 'U') {
        let policyBlock = null;
        if (joinType === '기기변경') {
          policyBlock = isGalcams ? extraConfig.U_CHANGE_GALCAMS : extraConfig.U_CHANGE_DOTCOM;
        } else if (joinType === '번호이동') {
          policyBlock = isGalcams ? extraConfig.U_MNP_GALCAMS : extraConfig.U_MNP_DOTCOM;
        }

        if (policyBlock) {
          if (policyBlock.OVER_95K !== undefined && planPrice >= 95000) {
            newAddCommon = policyBlock.OVER_95K.common;
            newAddSelective = policyBlock.OVER_95K.selective;
          } else if (policyBlock.OVER_61K !== undefined && planPrice >= 61000) {
            newAddCommon = policyBlock.OVER_61K.common;
            newAddSelective = policyBlock.OVER_61K.selective;
          } else if (policyBlock.OVER_33K !== undefined && planPrice >= 33000) {
            newAddCommon = policyBlock.OVER_33K.common;
            newAddSelective = policyBlock.OVER_33K.selective;
          } else {
            newAddCommon = 0;
            newAddSelective = 0;
          }
        } else {
          if (extraConfig.U_TIER_A_DOTCOM !== undefined) {
            if (planPrice >= POLICY.TIERS.U_TIER_A_MIN) newAddCommon = isGalcams ? (extraConfig.U_TIER_A_GALCAMS || 0) : (extraConfig.U_TIER_A_DOTCOM || 0);
          } else if (planPrice >= POLICY.TIERS.U_TIER_1_MIN && planPrice < POLICY.TIERS.U_TIER_1_MAX) {
            newAddCommon = isGalcams ? (extraConfig.U_TIER_1_GALCAMS || 0) : (extraConfig.U_TIER_1_DOTCOM || 0);
          } else if (planPrice >= POLICY.TIERS.U_TIER_2_MIN) {
            newAddCommon = isGalcams ? (extraConfig.U_TIER_2_GALCAMS || 0) : (extraConfig.U_TIER_2_DOTCOM || 0);
          }
          newAddSelective = newAddCommon;
        }
      } 
      else if (operator === 'KT') {
        let policyBlock = null;
        if (joinType === '기기변경') {
          policyBlock = isGalcams ? extraConfig.KT_CHANGE_GALCAMS : extraConfig.KT_CHANGE_DOTCOM;
        } else if (joinType === '번호이동') {
          policyBlock = isGalcams ? extraConfig.KT_MNP_GALCAMS : extraConfig.KT_MNP_DOTCOM;
        }

        if (policyBlock) {
          if (policyBlock.OVER_90K !== undefined && planPrice >= 90000) {
            newAddCommon = policyBlock.OVER_90K.common;
            newAddSelective = policyBlock.OVER_90K.selective;
          } else if (policyBlock.OVER_61K !== undefined && planPrice >= 61000) {
            newAddCommon = policyBlock.OVER_61K.common;
            newAddSelective = policyBlock.OVER_61K.selective;
          } else if (policyBlock.OVER_33K !== undefined && planPrice >= 33000) {
            newAddCommon = policyBlock.OVER_33K.common;
            newAddSelective = policyBlock.OVER_33K.selective;
          } else {
            newAddCommon = 0;
            newAddSelective = 0;
          }
        } else {
          if (planPrice >= POLICY.TIERS.KT_TIER_1_MIN) {
            newAddCommon = isGalcams ? (extraConfig.KT_TIER_1_GALCAMS || 0) : (extraConfig.KT_TIER_1_DOTCOM || 0);
            newAddSelective = newAddCommon;
          }
        }
      }
      setAdditionalSupport(newAddCommon);
      setSelectiveAdditionalSupport(newAddSelective);
      setAdditionalEdited(true); 

    } else {
      setCommonSupport(0);
      setAdditionalSupport(0);
      setSelectiveAdditionalSupport(0);
      setAdditionalEdited(false);
    }
  }, [selectedDevice, selectedPlan, operator, isGalcams, joinType, plans]);


  const devicePrice = useMemo(()=> DEVICE_LIST.find(d=>d.name===selectedDevice)?.price || 0, [selectedDevice]);

  const originalPlanPrice = useMemo(() => plans.find(p => p.name === selectedPlan)?.price || 0, [selectedPlan, plans]);
  const monthlyPlanDiscount = useMemo(() => Math.round(originalPlanPrice * 0.25), [originalPlanPrice]);

  const totalDiscount_Public = commonSupport + additionalSupport;
  const principal_Public = Math.max(0, devicePrice - totalDiscount_Public - doubleStorageDiscount);
  const monthlyDevice_Public = installMonths === 0 ? 0 : Math.round(pmt(interestRate/12, installMonths, principal_Public));
  const totalMonthly_Public = monthlyDevice_Public + originalPlanPrice;
  const totalInterest_Public = installMonths === 0 ? 0 : Math.max(0, (monthlyDevice_Public * installMonths) - principal_Public);

  const principal_Selective = Math.max(0, devicePrice - selectiveAdditionalSupport - doubleStorageDiscount);
  const monthlyDevice_Selective = installMonths === 0 ? 0 : Math.round(pmt(interestRate/12, installMonths, principal_Selective));
  const planPrice_Selective = Math.round(originalPlanPrice * 0.75);
  const totalMonthly_Selective = monthlyDevice_Selective + planPrice_Selective;
  const totalInterest_Selective = installMonths === 0 ? 0 : Math.max(0, (monthlyDevice_Selective * installMonths) - principal_Selective);

  const monthlyInterest_Public = installMonths === 0 ? 0 : Math.max(0, monthlyDevice_Public - Math.round(principal_Public / installMonths));
  const monthlyInterest_Selective = installMonths === 0 ? 0 : Math.max(0, monthlyDevice_Selective - Math.round(principal_Selective / installMonths));

  const totalCost1_Public = totalMonthly_Public * 24;
  const totalCost1_Selective = totalMonthly_Selective * 24;
  const diff1 = Math.abs(totalCost1_Public - totalCost1_Selective);
  const winner1 = totalCost1_Public < totalCost1_Selective ? '공통지원' : (totalCost1_Selective < totalCost1_Public ? '선택약정' : '동일');

  const highlightClassPublic = totalMonthly_Public < totalMonthly_Selective ? 'bg-green-50 ring-2 ring-green-500 z-10' : 'bg-white';
  const highlightClassSelective = totalMonthly_Selective < totalMonthly_Public ? 'bg-green-50 ring-2 ring-green-500 z-10' : 'bg-white';
  
  const originalPlanPrice2 = useMemo(() => plans.find(p => p.name === selectedPlan2)?.price || 0, [selectedPlan2, plans]);
  const monthlyPlanDiscount2 = useMemo(() => Math.round(originalPlanPrice2 * 0.25), [originalPlanPrice2]);
  
  const totalMonthly_Public2 = monthlyDevice_Public + originalPlanPrice2;
  const planPrice_Selective2 = Math.round(originalPlanPrice2 * 0.75);
  const totalMonthly_Selective2 = monthlyDevice_Selective + planPrice_Selective2;

  const totalCost2_Public = (totalMonthly_Public * 6) + (totalMonthly_Public2 * 18);
  const totalCost2_Selective = (totalMonthly_Selective * 6) + (totalMonthly_Selective2 * 18);
  const diff2 = Math.abs(totalCost2_Public - totalCost2_Selective);
  const winner2 = totalCost2_Public < totalCost2_Selective ? '공통지원' : (totalCost2_Selective < totalCost2_Public ? '선택약정' : '동일');

  const highlightClassPublic2 = totalCost2_Public < totalCost2_Selective ? 'bg-green-50 ring-2 ring-green-500 z-10' : 'bg-white';
  const highlightClassSelective2 = totalCost2_Selective < totalCost2_Public ? 'bg-green-50 ring-2 ring-green-500 z-10' : 'bg-white';

  const featureText = useMemo(()=> features[normalizePlanKey(selectedPlan)] || '', [selectedPlan, features]);
  const featureText2 = useMemo(()=> features[normalizePlanKey(selectedPlan2)] || '', [selectedPlan2, features]);

  const handleContractTypeChange = (newType) => setContractType(newType);

  return (
    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
      <div className="bg-white p-4 md:p-5 rounded-lg shadow-xl relative w-full max-w-4xl max-h-[95vh] overflow-y-auto border-4 border-indigo-200">
        <button onClick={onClose} className="absolute top-3 right-3 text-gray-400 hover:text-gray-800 text-3xl leading-none">&times;</button>
        <h2 className="text-2xl font-bold mb-3 text-center text-indigo-700">유지 비용 시뮬레이터</h2>
        
        {/* 상단 컨트롤러 (유지 비용 팝업창은 원본 코드 유지: w-[calc(40%+2rem)]) */}
        <div className="mb-3 flex flex-nowrap gap-2 items-end w-full">
          <select value={selectedDevice} onChange={e=>setSelectedDevice(e.target.value)} className="border p-2 rounded w-[45%] md:w-[calc(40%+2rem)] shrink-0 outline-none focus:ring-2 focus:ring-blue-500 h-[38px]">
            {CATEGORIZED_DEVICE_LIST.map(group => (
              <optgroup key={group.category} label={group.category}>
                {group.devices.map(d => (
                  <option key={d.name} value={d.name} style={d.isHighlight ? { fontWeight: 'bold', color: '#1D4ED8' } : d.isGreen ? { fontWeight: 'bold', color: '#059669' } : d.isPurple ? { fontWeight: 'bold', color: '#9333EA' } : {}}>{d.name} ({d.price.toLocaleString()}원)</option>
                ))}
              </optgroup>
            ))}
          </select>
          
          <div className="flex flex-col flex-1 min-w-0">
            <div className="text-red-500 font-bold text-[13px] mb-1 text-center w-full whitespace-nowrap">개통 요금제</div>
            <div className="relative w-full" ref={planDropdownRef}>
              <input type="text" value={planSearchTerm} onChange={(e) => { setPlanSearchTerm(e.target.value); setIsPlanDropdownOpen(true); }} onClick={(e) => { setIsPlanDropdownOpen(true); e.target.select(); }} placeholder="요금제 검색..." className="border p-2 rounded w-full outline-none focus:ring-2 focus:ring-blue-500 h-[38px]" />
              {isPlanDropdownOpen && (
                <div className="absolute z-[60] w-full mt-1 bg-white border border-gray-300 rounded shadow-lg max-h-60 overflow-y-auto">
                  {filteredPlans.length > 0 ? (
                    filteredPlans.map(p => (
                      <div key={p.name} onClick={() => { setSelectedPlan(p.name); setPlanSearchTerm(`${p.name} (${p.price.toLocaleString()}원)`); setIsPlanDropdownOpen(false); }} className={`px-3 py-2 cursor-pointer hover:bg-blue-50 text-sm border-b last:border-b-0 ${selectedPlan === p.name ? 'bg-blue-100 font-bold' : ''}`}>
                        <span className="text-gray-500 text-xs mr-1">[{p.category}]</span> {p.name} <span className="text-gray-700 ml-1">({p.price.toLocaleString()}원)</span>
                      </div>
                    ))
                  ) : ( <div className="px-3 py-2 text-sm text-gray-500 text-center">검색 결과가 없습니다.</div> )}
                </div>
              )}
            </div>
          </div>

          <select value={installMonths} onChange={e=>setInstallMonths(Number(e.target.value))} className="border p-2 rounded w-[72px] md:w-24 text-center outline-none focus:ring-2 focus:ring-blue-500 h-[38px] shrink-0">
            {[0,6,12,18,24,30,36,48].map(m=><option key={m} value={m}>{m===0?'일시불':m+'개월'}</option>)}
          </select>
        </div>

        {/* 하단 컨트롤러 */}
        <div className="mb-3 flex flex-nowrap items-end gap-1.5 w-full">
          <div className="flex flex-col shrink-0">
            <label className="text-sm text-center">공통지원금</label>
            <input type="text" value={commonSupport.toLocaleString()} disabled={contractType === '선택약정'} onChange={e => { setCommonSupport(Number(e.target.value.replace(/\D/g, '')) || 0); setAdditionalEdited(false); }} className={`border p-1 rounded w-24 text-center ${contractType === '선택약정' ? 'bg-gray-200 text-gray-400' : 'bg-white'}`} onFocus={e=>e.target.select()} />
          </div>
          <div className="flex flex-col shrink-0">
            <label className="text-sm text-center">추가지원금</label>
            <input type="text" value={(contractType === '공통지원' ? additionalSupport : selectiveAdditionalSupport).toLocaleString()} onChange={e => { const v = Number(e.target.value.replace(/\D/g, '')) || 0; if (contractType === '공통지원') { setAdditionalSupport(v); setAdditionalEdited(true); } else { setSelectiveAdditionalSupport(v); } }} className="border p-1 rounded w-24 text-center bg-white" onFocus={e=>e.target.select()} />
          </div>
          <div className="flex flex-col shrink-0">
            <label className="text-sm mb-1 text-center">약정</label>
            <div className="flex border rounded overflow-hidden h-[34px]">

// ------------------ 계산기 컴포넌트 ------------------
function Calculator({
  plans, features, operator, 
  setShowRequestFormPopup, setShowDeviceColorPopup, setShowPlanSummaryPopup, showMaintenancePopup, setShowMaintenancePopup
}) {
  const [selectedDevice, setSelectedDevice] = useState(CATEGORIZED_DEVICE_LIST[0].devices[0].name);
  const [selectedPlan, setSelectedPlan] = useState(plans[0]?.name || '');
  const [installMonths, setInstallMonths] = useState(24);
  const [interestRate] = useState(0.059);
  
  const [commonSupport, setCommonSupport] = useState(0);
  const [additionalSupport, setAdditionalSupport] = useState(0);
  const [selectiveAdditionalSupport, setSelectiveAdditionalSupport] = useState(0); 
  const [additionalEdited, setAdditionalEdited] = useState(false);
  const [contractType, setContractType] = useState('공통지원');
  
  const [joinType, setJoinType] = useState('기기변경');
  const [isGalcams, setIsGalcams] = useState(false);

  const [planSearchTerm, setPlanSearchTerm] = useState('');
  const [isPlanDropdownOpen, setIsPlanDropdownOpen] = useState(false);
  const planDropdownRef = useRef(null);

  // 색상 드롭다운 State
  const [isColorDropdownOpen, setIsColorDropdownOpen] = useState(false);
  const colorDropdownRef = useRef(null);

  // 사전예약 단말기 여부 확인
  const isPreorderDevice = useMemo(() => {
    const preorderCategory = CATEGORIZED_DEVICE_LIST.find(c => c.category === '사전예약');
    return preorderCategory ? preorderCategory.devices.some(d => d.name === selectedDevice) : false;
  }, [selectedDevice]);

  // 사전예약 단말기일 경우에만 더블 스토리지 할인 적용
  const doubleStorageDiscount = isPreorderDevice ? PREORDER_DOUBLE_STORAGE_DISCOUNT : 0;

  useEffect(() => { 
    setSelectedPlan(plans[0]?.name || ''); 
  }, [plans]);

  // 색상 드롭다운 외부 클릭 감지
  useEffect(() => {
    const handleClickOutside = (event) => {
      if (colorDropdownRef.current && !colorDropdownRef.current.contains(event.target)) {
        setIsColorDropdownOpen(false);
      }
    };
    document.addEventListener("mousedown", handleClickOutside);
    return () => document.removeEventListener("mousedown", handleClickOutside);
  }, []);

  const handleColorCopy = (copyText) => {
    navigator.clipboard.writeText(copyText).then(() => {
      alert("모델명이 복사되었습니다.");
      setIsColorDropdownOpen(false);
    });
  };

  const currentColors = DEVICE_COLORS_MAP[selectedDevice] || [];

  useEffect(() => {
    const plan = plans.find(p => p.name === selectedPlan);
    setPlanSearchTerm(plan ? `${plan.name} (${plan.price.toLocaleString()}원)` : selectedPlan);
  }, [selectedPlan, plans]);

  useEffect(() => {
    const handleClickOutside = (event) => {
      if (planDropdownRef.current && !planDropdownRef.current.contains(event.target)) {
        setIsPlanDropdownOpen(false);
        const plan = plans.find(p => p.name === selectedPlan);
        setPlanSearchTerm(plan ? `${plan.name} (${plan.price.toLocaleString()}원)` : selectedPlan);
      }
    };
    document.addEventListener("mousedown", handleClickOutside);
    return () => document.removeEventListener("mousedown", handleClickOutside);
  }, [selectedPlan, plans]);

  const filteredPlans = useMemo(() => {
    const term = planSearchTerm.trim().toLowerCase();
    const plan = plans.find(p => p.name === selectedPlan);
    const formattedSelected = plan ? `${plan.name} (${plan.price.toLocaleString()}원)`.toLowerCase() : selectedPlan.toLowerCase();
    
    if (!term || term === formattedSelected) return plans;
    return plans.filter(p => 
      (p.name || '').toLowerCase().includes(term) || 
      p.price.toString().includes(term.replace(/,/g, '')) ||
      (p.category || '').toLowerCase().includes(term)
    );
  }, [plans, planSearchTerm, selectedPlan]);

  const originalPlanPrice = useMemo(() => plans.find(p => p.name === selectedPlan)?.price || 0, [selectedPlan, plans]);

  // [로직 1] 통신사나 단말기 변경 시 갤캠스 체크 해제 
  useEffect(() => {
    setIsGalcams(false);
  }, [operator, selectedDevice]);

  // [로직 2] 통합된 지원금 자동 매핑 로직
  useEffect(() => {
    const devicePolicy = POLICY.DEVICES[selectedDevice];
    const planInfo = plans.find(p => p.name === selectedPlan);
    const planPrice = planInfo ? planInfo.price : 0;

    if (devicePolicy) {
      let newCommon = 0;
      if (operator === 'U' && devicePolicy.U_COMMON && devicePolicy.U_COMMON[planPrice] !== undefined) {
        newCommon = devicePolicy.U_COMMON[planPrice];
      } else if (operator === 'KT' && devicePolicy.KT_COMMON && devicePolicy.KT_COMMON[planPrice] !== undefined) {
        newCommon = devicePolicy.KT_COMMON[planPrice];
      }
      setCommonSupport(newCommon);

      let newAddCommon = 0;
      let newAddSelective = 0;
      const extraConfig = devicePolicy.EXTRA || {};
      
      if (operator === 'U') {
        let policyBlock = null;
        if (joinType === '기기변경') {
          policyBlock = isGalcams ? extraConfig.U_CHANGE_GALCAMS : extraConfig.U_CHANGE_DOTCOM;
        } else if (joinType === '번호이동') {
          policyBlock = isGalcams ? extraConfig.U_MNP_GALCAMS : extraConfig.U_MNP_DOTCOM;
        }

        if (policyBlock) {
          if (policyBlock.OVER_95K !== undefined && planPrice >= 95000) {
            newAddCommon = policyBlock.OVER_95K.common;
            newAddSelective = policyBlock.OVER_95K.selective;
          } else if (policyBlock.OVER_61K !== undefined && planPrice >= 61000) {
            newAddCommon = policyBlock.OVER_61K.common;
            newAddSelective = policyBlock.OVER_61K.selective;
          } else if (policyBlock.OVER_33K !== undefined && planPrice >= 33000) {
            newAddCommon = policyBlock.OVER_33K.common;
            newAddSelective = policyBlock.OVER_33K.selective;
          } else {
            newAddCommon = 0;
            newAddSelective = 0;
          }
        } else {
          if (extraConfig.U_TIER_A_DOTCOM !== undefined) {
            if (planPrice >= POLICY.TIERS.U_TIER_A_MIN) newAddCommon = isGalcams ? (extraConfig.U_TIER_A_GALCAMS || 0) : (extraConfig.U_TIER_A_DOTCOM || 0);
          } else if (planPrice >= POLICY.TIERS.U_TIER_1_MIN && planPrice < POLICY.TIERS.U_TIER_1_MAX) {
            newAddCommon = isGalcams ? (extraConfig.U_TIER_1_GALCAMS || 0) : (extraConfig.U_TIER_1_DOTCOM || 0);
          } else if (planPrice >= POLICY.TIERS.U_TIER_2_MIN) {
            newAddCommon = isGalcams ? (extraConfig.U_TIER_2_GALCAMS || 0) : (extraConfig.U_TIER_2_DOTCOM || 0);
          }
          newAddSelective = newAddCommon;
        }
      } 
      else if (operator === 'KT') {
        let policyBlock = null;
        if (joinType === '기기변경') {
          policyBlock = isGalcams ? extraConfig.KT_CHANGE_GALCAMS : extraConfig.KT_CHANGE_DOTCOM;
        } else if (joinType === '번호이동') {
          policyBlock = isGalcams ? extraConfig.KT_MNP_GALCAMS : extraConfig.KT_MNP_DOTCOM;
        }

        if (policyBlock) {
          if (policyBlock.OVER_90K !== undefined && planPrice >= 90000) {
            newAddCommon = policyBlock.OVER_90K.common;
            newAddSelective = policyBlock.OVER_90K.selective;
          } else if (policyBlock.OVER_61K !== undefined && planPrice >= 61000) {
            newAddCommon = policyBlock.OVER_61K.common;
            newAddSelective = policyBlock.OVER_61K.selective;
          } else if (policyBlock.OVER_33K !== undefined && planPrice >= 33000) {
            newAddCommon = policyBlock.OVER_33K.common;
            newAddSelective = policyBlock.OVER_33K.selective;
          } else {
            newAddCommon = 0;
            newAddSelective = 0;
          }
        } else {
          if (planPrice >= POLICY.TIERS.KT_TIER_1_MIN) {
            newAddCommon = isGalcams ? (extraConfig.KT_TIER_1_GALCAMS || 0) : (extraConfig.KT_TIER_1_DOTCOM || 0);
            newAddSelective = newAddCommon;
          }
        }
      }
      setAdditionalSupport(newAddCommon);
      setSelectiveAdditionalSupport(newAddSelective);
      setAdditionalEdited(true); 

    } else {
      setCommonSupport(0);
      setAdditionalSupport(0);
      setSelectiveAdditionalSupport(0);
      setAdditionalEdited(false);
    }
  }, [selectedDevice, selectedPlan, operator, isGalcams, joinType, plans]);


  const devicePrice = useMemo(()=> DEVICE_LIST.find(d=>d.name===selectedDevice)?.price || 0, [selectedDevice]);
  const monthlyPlanDiscount = useMemo(() => Math.round(originalPlanPrice * 0.25), [originalPlanPrice]);
  const totalPlanDiscount = useMemo(() => monthlyPlanDiscount * 24, [monthlyPlanDiscount]);
  const featureText = useMemo(()=> features[normalizePlanKey(selectedPlan)] || '', [selectedPlan, features]);

  const totalDiscount_Public = commonSupport + additionalSupport;
  // 더블 스토리지 할인 적용 (할부원금에서 차감)
  const principal_Public = Math.max(0, devicePrice - totalDiscount_Public - doubleStorageDiscount);
  const monthlyDevice_Public = installMonths === 0 ? 0 : Math.round(pmt(interestRate/12, installMonths, principal_Public));
  const totalMonthly_Public = monthlyDevice_Public + originalPlanPrice;
  const totalInterest_Public = installMonths === 0 ? 0 : Math.max(0, (monthlyDevice_Public * installMonths) - principal_Public);

  const totalDiscount_Selective = selectiveAdditionalSupport + totalPlanDiscount;
  // 더블 스토리지 할인 적용 (선택약정 할부원금에서도 차감)
  const principal_Selective = Math.max(0, devicePrice - selectiveAdditionalSupport - doubleStorageDiscount);
  const monthlyDevice_Selective = installMonths === 0 ? 0 : Math.round(pmt(interestRate/12, installMonths, principal_Selective));
  const planPrice_Selective = Math.round(originalPlanPrice * 0.75);
  const totalMonthly_Selective = monthlyDevice_Selective + planPrice_Selective;
  const totalInterest_Selective = installMonths === 0 ? 0 : Math.max(0, (monthlyDevice_Selective * installMonths) - principal_Selective);

  const monthlyInterest_Public = installMonths === 0 ? 0 : Math.max(0, monthlyDevice_Public - Math.round(principal_Public / installMonths));
  const monthlyInterest_Selective = installMonths === 0 ? 0 : Math.max(0, monthlyDevice_Selective - Math.round(principal_Selective / installMonths));

  const highlightClassPublic = totalMonthly_Public < totalMonthly_Selective ? 'bg-green-50 ring-2 ring-green-500 z-10' : 'bg-white';
  const highlightClassSelective = totalMonthly_Selective < totalMonthly_Public ? 'bg-green-50 ring-2 ring-green-500 z-10' : 'bg-white';

  const handleContractTypeChange = (newType) => setContractType(newType);

  return (
    <div className="p-4 max-w-4xl mx-auto">
      <div className="mb-3 flex flex-nowrap gap-1.5 md:gap-2 items-center w-full">
        
        {/* 단말기 래퍼: 전체의 50%를 넉넉하게 차지하도록 변경 */}
        <div className="flex gap-1 shrink-0 relative w-[50%] md:w-[45%]" ref={colorDropdownRef}>
          {/* select 안쪽 공간이 빈 공간을 꽉 채우도록 flex-1 부여 */}
          <select value={selectedDevice} onChange={e=>setSelectedDevice(e.target.value)} className="border p-2 rounded flex-1 min-w-0 outline-none focus:ring-2 focus:ring-blue-500 h-[38px]">
            {CATEGORIZED_DEVICE_LIST.map(group => (
              <optgroup key={group.category} label={group.category}>
                {group.devices.map(d => (
                  <option 
                    key={d.name} 
                    value={d.name} 
                    className={d.isHighlight ? "font-bold text-blue-700" : d.isGreen ? "font-bold text-emerald-600" : d.isPurple ? "font-bold text-purple-600" : ""} 
style={d.isHighlight ? { fontWeight: 'bold', color: '#1D4ED8' } : d.isGreen ? { fontWeight: 'bold', color: '#059669' } : d.isPurple ? { fontWeight: 'bold', color: '#9333EA' } : {}}
                  >
                    {d.name} ({d.price.toLocaleString()}원)
                  </option>
                ))}
              </optgroup>
            ))}
          </select>
          <button type="button" onClick={() => setIsColorDropdownOpen(!isColorDropdownOpen)} className="bg-gray-500 text-white px-2.5 md:px-3 rounded hover:bg-gray-600 text-[13px] font-medium whitespace-nowrap shrink-0 h-[38px]">
            모델명
          </button>
          
          {/* 색상 드롭다운 */}
          {isColorDropdownOpen && (
            <div className="absolute top-[40px] left-0 mt-1 z-[60] w-max min-w-[150px] bg-white border border-gray-300 rounded shadow-lg overflow-hidden max-h-60 overflow-y-auto">
              {currentColors.length > 0 ? (
                currentColors.map((c, idx) => (
                  <div
                    key={idx}
                    onClick={() => handleColorCopy(c.copyText)}
                    className="px-3 py-2 cursor-pointer hover:bg-blue-50 text-sm border-b last:border-b-0 text-gray-800"
                  >
                    {c.name}
                  </div>
                ))
              ) : (
                <div
                  onClick={() => handleColorCopy(selectedDevice)}
                  className="px-3 py-2 cursor-pointer hover:bg-gray-100 text-sm text-gray-500"
                >
                  색상 설정 없음<br/><span className="text-xs text-gray-400">(모델명만 복사)</span>
                </div>
              )}
            </div>
          )}
        </div>
        
        {/* 요금제 칸: 남은 오른쪽 공간을 전부 차지하도록 flex-1 및 최소 너비 보장 */}
        <div className="relative flex-1 min-w-[100px]" ref={planDropdownRef}>
          <input 
            type="text" 
            value={planSearchTerm} 
            onChange={(e) => { setPlanSearchTerm(e.target.value); setIsPlanDropdownOpen(true); }}
            onClick={(e) => { setIsPlanDropdownOpen(true); e.target.select(); }}
            placeholder="요금제 검색..."
            className="border p-2 rounded w-full outline-none focus:ring-2 focus:ring-blue-500 h-[38px]"
          />
          {isPlanDropdownOpen && (
            <div className="absolute z-50 w-full mt-1 bg-white border border-gray-300 rounded shadow-lg max-h-60 overflow-y-auto">
              {filteredPlans.length > 0 ? (
                filteredPlans.map(p => (
                  <div 
                    key={p.name} 
                    onClick={() => { setSelectedPlan(p.name); setPlanSearchTerm(`${p.name} (${p.price.toLocaleString()}원)`); setIsPlanDropdownOpen(false); }}
                    className={`px-3 py-2 cursor-pointer hover:bg-blue-50 text-sm border-b last:border-b-0 ${selectedPlan === p.name ? 'bg-blue-100 font-bold' : ''}`}
                  >
                    <span className="text-gray-500 text-xs mr-1">[{p.category}]</span> 
                    {p.name} <span className="text-gray-700 ml-1">({p.price.toLocaleString()}원)</span>
                  </div>
                ))
              ) : (
                <div className="px-3 py-2 text-sm text-gray-500 text-center">검색 결과가 없습니다.</div>
              )}
            </div>
          )}
        </div>

        <select value={installMonths} onChange={e=>setInstallMonths(Number(e.target.value))} className="border p-2 rounded w-[70px] md:w-24 text-center outline-none focus:ring-2 focus:ring-blue-500 shrink-0 h-[38px]">
          {[0,6,12,18,24,30,36,48].map(m=><option key={m} value={m}>{m===0?'일시불':m+'개월'}</option>)}
        </select>
      </div>

      <div className="mb-3 flex flex-nowrap items-end gap-1.5 w-full">
        
        <div className="flex flex-col shrink-0">
          <label className="text-sm text-center">공통지원금</label>
          <input type="text" value={commonSupport.toLocaleString()} disabled={contractType === '선택약정'} onChange={e => { setCommonSupport(Number(e.target.value.replace(/\D/g, '')) || 0); setAdditionalEdited(false); }} className={`border p-1 rounded w-24 text-center ${contractType === '선택약정' ? 'bg-gray-200 text-gray-400' : 'bg-white'}`} onFocus={e=>e.target.select()} />
        </div>
        
        <div className="flex flex-col shrink-0">
          <label className="text-sm text-center">추가지원금</label>
          <input type="text" value={(contractType === '공통지원' ? additionalSupport : selectiveAdditionalSupport).toLocaleString()} onChange={e => { const v = Number(e.target.value.replace(/\D/g, '')) || 0; if (contractType === '공통지원') { setAdditionalSupport(v); setAdditionalEdited(true); } else { setSelectiveAdditionalSupport(v); } }} className="border p-1 rounded w-24 text-center bg-white" onFocus={e=>e.target.select()} />
        </div>

        <div className="flex flex-col shrink-0">
          <label className="text-sm mb-1 text-center">약정</label>
          <div className="flex border rounded overflow-hidden h-[34px]">
            <button onClick={()=>handleContractTypeChange('공통지원')} className={`px-2 text-sm transition-colors whitespace-nowrap ${contractType==='공통지원'?'bg-blue-600 text-white':'bg-white text-gray-700 hover:bg-gray-100'}`}>공통지원</button>
            <div className="border-l"></div>
            <button onClick={()=>handleContractTypeChange('선택약정')} className={`px-2 text-sm transition-colors whitespace-nowrap ${contractType==='선택약정'?'bg-blue-600 text-white':'bg-white text-gray-700 hover:bg-gray-100'}`}>선택약정</button>
          </div>
        </div>
        
        <div className="flex flex-col shrink-0">
           <label className="text-sm mb-1 text-center">&nbsp;</label>
           <div className="flex gap-1.5 items-center h-[34px]">
            
            <div className="flex gap-2 items-center h-full bg-white border border-gray-300 px-2 rounded">
              <label className="flex items-center text-[13px] cursor-pointer text-gray-700 whitespace-nowrap font-medium">
                <input type="radio" value="기기변경" checked={joinType === '기기변경'} onChange={() => setJoinType('기기변경')} className="mr-1 w-3.5 h-3.5 text-blue-600 focus:ring-blue-500" />
                기기변경
              </label>
              <label className="flex items-center text-[13px] cursor-pointer text-gray-700 whitespace-nowrap font-medium">
                <input type="radio" value="번호이동" checked={joinType === '번호이동'} onChange={() => setJoinType('번호이동')} className="mr-1 w-3.5 h-3.5 text-blue-600 focus:ring-blue-500" />
                번호이동
              </label>
              <div className="border-l border-gray-300 h-4 mx-1"></div>
              <label className="flex items-center text-[13px] cursor-pointer text-gray-700 whitespace-nowrap font-medium">
                <input type="checkbox" checked={isGalcams} onChange={() => setIsGalcams(!isGalcams)} className="mr-1 w-3.5 h-3.5 text-blue-600 rounded border-gray-300 focus:ring-blue-500" />
                갤캠스
              </label>
            </div>

            <button onClick={() => setShowPlanSummaryPopup(true)} className="bg-blue-500 text-white px-2.5 rounded hover:bg-blue-600 h-[34px] flex items-center justify-center text-[13px] font-medium whitespace-nowrap">요금제 정리</button>
            <button onClick={() => setShowRequestFormPopup(true)} className="bg-purple-600 text-white px-2.5 rounded hover:bg-purple-700 h-[34px] flex items-center justify-center text-[13px] font-medium whitespace-nowrap">요청 양식</button>
            <button onClick={() => setShowDeviceColorPopup(true)} className="bg-pink-600 text-white px-2.5 rounded hover:bg-pink-700 h-[34px] flex items-center justify-center text-[13px] font-medium whitespace-nowrap">단말기 색상</button>
           </div>
        </div>
      </div>

      <div className="mt-3">
        {featureText && (
          <div className="p-2.5 rounded-lg shadow-sm border border-blue-200 bg-blue-50 mb-3 text-center">
            <span className="font-bold text-blue-800 mr-2">요금제 혜택:</span>
            <span className="text-blue-700 text-[15px]">{featureText}</span>
          </div>
        )}

        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 relative mb-3">
          {/* 공통지원 */}
          <div className={`p-4 rounded-xl shadow-md border border-gray-200 transition-all flex flex-col relative ${highlightClassPublic}`}>
            <h3 className="text-[17px] font-bold text-center text-blue-700 mb-3">공통지원</h3>

            {/* A 월 통신요금 */}
            <div className="mb-2">
              <div className="flex justify-between items-end mb-2">
                <div className="flex items-center gap-1.5">
                  <span className="bg-[#ec008c] text-white text-sm font-bold px-1.5 py-0 rounded">A</span>
                  <span className="font-bold text-[17px]">월 통신요금</span>
                </div>
                <span className="font-bold text-lg">{originalPlanPrice.toLocaleString()} 원</span>
              </div>
              <div className="flex justify-between text-gray-500 text-[15px]">
                <span>{selectedPlan}</span>
                <span>{originalPlanPrice.toLocaleString()} 원</span>
              </div>
            </div>

            <hr className="border-black mb-2" />

            {/* B 월 할부금 */}
            <div className="mb-2">
              <div className="flex justify-between items-end mb-2">
                <div className="flex items-center gap-1.5">
                  <span className="bg-[#ec008c] text-white text-sm font-bold px-1.5 py-0 rounded">B</span>
                  <span className="font-bold text-[17px]">월 할부금({installMonths === 0 ? '일시불' : installMonths + '개월'})</span>
                </div>
                <span className="font-bold text-lg">{monthlyDevice_Public.toLocaleString()} 원</span>
              </div>
              <div className="flex justify-between text-gray-500 text-[15px] mb-1">
                <span>출고가</span>
                <span>{devicePrice.toLocaleString()} 원</span>
              </div>
              {/* 더블 스토리지 할인 항목 */}
              {isPreorderDevice && (
                <div className="flex justify-between text-[#ec008c] font-bold text-[15px] mb-1">
                  <span>더블 스토리지 할인</span>
                  <span>- {doubleStorageDiscount.toLocaleString()} 원</span>
                </div>
              )}
              {commonSupport > 0 && (
                <div className="flex justify-between text-[#ec008c] font-bold text-[15px] mb-1">
                  <span>공통 지원금</span>
                  <span>- {commonSupport.toLocaleString()} 원</span>
                </div>
              )}
              {additionalSupport > 0 && (
                <div className="flex justify-between text-[#ec008c] font-bold text-[15px] mb-2">
                  <span>삼성닷컴 추가지원금</span>
                  <span>- {additionalSupport.toLocaleString()} 원</span>
                </div>
              )}

              <hr className="border-dashed border-gray-300 my-2" />

              <div className="flex justify-between text-black font-bold text-[15px] mb-1">
                <span>할부원금</span>
                <span className="flex items-center"><span className="text-red-600 font-black text-lg mr-1 leading-none">➔</span> {principal_Public.toLocaleString()} 원</span>
              </div>
              {installMonths > 0 && (
                <div className="flex justify-between text-gray-500 text-[15px]">
                  <span>할부이자 <span className="text-[13px] ml-1 tracking-tight">(총 {totalInterest_Public.toLocaleString()}원)</span></span>
                  <span>{monthlyInterest_Public.toLocaleString()} 원</span>
                </div>
              )}
            </div>

            <hr className="border-black border-t-[2px] mb-2" />

            {/* A + B 월납부금 */}
            <div className="mt-1">
              <div className="flex items-center gap-1.5 mb-2">
                <span className="bg-[#ec008c] text-white text-sm font-bold px-1.5 py-0 rounded">A + B</span>
                <span className="font-bold text-[17px]">월납부금</span>
              </div>
              <div className="text-right mt-2">
                <span className="font-extrabold text-3xl tracking-tight">{totalMonthly_Public.toLocaleString()}</span>
                <span className="font-bold text-xl ml-1">원</span>
              </div>
            </div>
          </div>

          {/* 선택약정 */}
          <div className={`p-4 rounded-xl shadow-md border border-gray-200 transition-all flex flex-col relative ${highlightClassSelective}`}>
            <h3 className="text-[17px] font-bold text-center text-blue-700 mb-3">선택약정 (25% 요금할인)</h3>

            {/* A 월 통신요금 */}
            <div className="mb-2">
              <div className="flex justify-between items-end mb-2">
                <div className="flex items-center gap-1.5">
                  <span className="bg-[#ec008c] text-white text-sm font-bold px-1.5 py-0 rounded">A</span>
                  <span className="font-bold text-[17px]">월 통신요금</span>
                </div>
                <span className="font-bold text-lg">{planPrice_Selective.toLocaleString()} 원</span>
              </div>
              <div className="flex justify-between text-gray-500 text-[15px] mb-1">
                <span>{selectedPlan}</span>
                <span>{originalPlanPrice.toLocaleString()} 원</span>
              </div>
              <div className="flex justify-between text-[#ec008c] font-bold text-[15px]">
                <span>선택약정 할인</span>
                <span>- {monthlyPlanDiscount.toLocaleString()} 원</span>
              </div>
            </div>

            <hr className="border-black mb-2" />

            {/* B 월 할부금 */}
            <div className="mb-2">
              <div className="flex justify-between items-end mb-2">
                <div className="flex items-center gap-1.5">
                  <span className="bg-[#ec008c] text-white text-sm font-bold px-1.5 py-0 rounded">B</span>
                  <span className="font-bold text-[17px]">월 할부금({installMonths === 0 ? '일시불' : installMonths + '개월'})</span>
                </div>
                <span className="font-bold text-lg">{monthlyDevice_Selective.toLocaleString()} 원</span>
              </div>
              <div className="flex justify-between text-gray-500 text-[15px] mb-1">
                <span>출고가</span>
                <span>{devicePrice.toLocaleString()} 원</span>
              </div>
              {/* 더블 스토리지 할인 항목 */}
              {isPreorderDevice && (
                <div className="flex justify-between text-[#ec008c] font-bold text-[15px] mb-1">
                  <span>더블 스토리지 할인</span>
                  <span>- {doubleStorageDiscount.toLocaleString()} 원</span>
                </div>
              )}
              {selectiveAdditionalSupport > 0 && (
                <div className="flex justify-between text-[#ec008c] font-bold text-[15px] mb-2">
                  <span>삼성닷컴 추가지원금</span>
                  <span>- {selectiveAdditionalSupport.toLocaleString()} 원</span>
                </div>
              )}

              <hr className="border-dashed border-gray-300 my-2" />

              <div className="flex justify-between text-black font-bold text-[15px] mb-1">
                <span>할부원금</span>
                <span className="flex items-center"><span className="text-red-600 font-black text-lg mr-1 leading-none">➔</span> {principal_Selective.toLocaleString()} 원</span>
              </div>
              {installMonths > 0 && (
                <div className="flex justify-between text-gray-500 text-[15px]">
                  <span>할부이자 <span className="text-[13px] ml-1 tracking-tight">(총 {totalInterest_Selective.toLocaleString()}원)</span></span>
                  <span>{monthlyInterest_Selective.toLocaleString()} 원</span>
                </div>
              )}
            </div>

            <hr className="border-black border-t-[2px] mb-2" />

            {/* A + B 월납부금 */}
            <div className="mt-1">
              <div className="flex items-center gap-1.5 mb-2">
                <span className="bg-[#ec008c] text-white text-sm font-bold px-1.5 py-0 rounded">A + B</span>
                <span className="font-bold text-[17px]">월납부금</span>
              </div>
              <div className="text-right mt-2">
                <span className="font-extrabold text-3xl tracking-tight">{totalMonthly_Selective.toLocaleString()}</span>
                <span className="font-bold text-xl ml-1">원</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      {/* 완전히 독립적으로 작동하는 유지 비용 팝업 (초기값으로 메인 화면의 데이터를 넘겨줌) */}
      {showMaintenancePopup && (
        <MaintenanceCostPopup 
          onClose={() => setShowMaintenancePopup(false)} 
          operator={operator}
          plans={plans}
          features={features}
          initialData={{
            selectedDevice, selectedPlan, installMonths, commonSupport,
            additionalSupport, selectiveAdditionalSupport, additionalEdited,
            contractType, joinType, isGalcams
          }}
        />
      )}
    </div>
  );
}

function App() {
  const [operator, setOperator] = useState('KT');
  const [trackingNumber, setTrackingNumber] = useState('');
  const [showPopup, setShowPopup] = useState(false);
  const [showRequestFormPopup, setShowRequestFormPopup] = useState(false);
  const [showDeviceColorPopup, setShowDeviceColorPopup] = useState(false);
  const [showPlanSummaryPopup, setShowPlanSummaryPopup] = useState(false);
  const [showNoticePopup, setShowNoticePopup] = useState(true);
  const [showMaintenancePopup, setShowMaintenancePopup] = useState(false);
  const [showStorePopup, setShowStorePopup] = useState(false); // 매장 찾기 팝업 상태

  const handleTrackingSearch = () => { if (!trackingNumber || !/^\d+$/.test(trackingNumber)) return alert('숫자로 된 송장번호를 입력해주세요.'); window.open(`https://trace.cjlogistics.com/next/tracking.html?wblNo=${trackingNumber}`, 'cjTrackingPopup', 'width=1600,height=900,scrollbars=yes,resizable=yes'); setTrackingNumber(''); };

  const plans = useMemo(()=> operator==='KT'?PLAN_LIST_KT:PLAN_LIST_U, [operator]);
  const features = useMemo(()=> operator==='KT'?PLAN_FEATURES_KT:PLAN_FEATURES_U, [operator]);

  return (
    <div>
      <div className="p-3 mb-1 max-w-4xl mx-auto flex flex-wrap gap-2 items-center border-b border-gray-100">
        <button className={`px-4 py-2 rounded text-sm font-bold shrink-0 ${operator === 'KT' ? 'bg-blue-600 text-white shadow' : 'bg-white border'}`} onClick={() => setOperator('KT')}>KT</button>
        <button className={`px-4 py-2 rounded text-sm font-bold shrink-0 ${operator === 'U' ? 'bg-green-600 text-white shadow' : 'bg-white border'}`} onClick={() => setOperator('U')}>U+</button>
        
        {operator === 'KT' && <a href="https://shop.kt.com/smart/supportAmtList.do" target="_blank" className="ml-2 bg-blue-500 text-white px-3 py-2 rounded hover:bg-blue-600 text-sm whitespace-nowrap shrink-0">KT 지원금</a>}
        {operator === 'U' && <a href="https://www.lguplus.com/mobile/financing-model" target="_blank" className="ml-2 bg-green-500 text-white px-3 py-2 rounded hover:bg-green-600 text-sm whitespace-nowrap shrink-0">U+ 지원금</a>}
        
        <div className="flex items-center ml-2 shrink-0">
          <a href="https://www.samsung.com/sec/smartphones/all-smartphones/?carrier-phone" target="_blank" className="bg-gray-800 text-white px-3 py-2 rounded hover:bg-gray-900 text-sm whitespace-nowrap">삼성닷컴</a>
        </div>
        
        <div className="flex items-center ml-2 gap-2 shrink-0">
          <button onClick={() => setShowMaintenancePopup(true)} className="bg-indigo-600 text-white px-3 py-2 rounded hover:bg-indigo-700 text-sm font-medium shadow whitespace-nowrap">유지 비용</button>
          <button onClick={() => setShowStorePopup(true)} className="bg-emerald-600 text-white px-3 py-2 rounded hover:bg-emerald-700 text-sm whitespace-nowrap">매장 찾기</button>
          <button onClick={() => setShowPopup(true)} className="bg-gray-600 text-white px-3 py-2 rounded hover:bg-gray-700 text-sm whitespace-nowrap">전화번호</button>
        </div>
        
        <div className="flex items-center ml-auto gap-2 shrink-0">
          <input type="text" value={trackingNumber} onChange={(e) => setTrackingNumber(e.target.value.replace(/\D/g, ''))} onKeyDown={(e) => e.key === 'Enter' && handleTrackingSearch()} placeholder="CJ 대한통운 송장번호" className="border p-2 rounded w-40 h-[36px] text-sm" />
          <button onClick={handleTrackingSearch} className="bg-amber-500 text-white px-3 py-2 rounded hover:bg-amber-600 h-[36px] text-sm flex items-center whitespace-nowrap">배송조회</button>
        </div>
      </div>

      <Calculator 
        plans={plans} features={features} operator={operator} 
        setShowRequestFormPopup={setShowRequestFormPopup} setShowDeviceColorPopup={setShowDeviceColorPopup} setShowPlanSummaryPopup={setShowPlanSummaryPopup} 
        showMaintenancePopup={showMaintenancePopup} setShowMaintenancePopup={setShowMaintenancePopup} 
      />
      {showPopup && <CustomerServicePopup onClose={() => setShowPopup(false)} />}
      {showRequestFormPopup && <RequestFormPopup onClose={() => setShowRequestFormPopup(false)} />}
      {showDeviceColorPopup && <DeviceColorPopup onClose={() => setShowDeviceColorPopup(false)} />}
      {showPlanSummaryPopup && <PlanSummaryPopup operator={operator} onClose={() => setShowPlanSummaryPopup(false)} />}
      {showNoticePopup && <NoticePopup onClose={() => setShowNoticePopup(false)} />}
      {showStorePopup && <StoreMapPopup onClose={() => setShowStorePopup(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
